# Holobench board profile — NXP MCXN947 (FRDM-MCXN947).
#
# A microcontroller tile, not an application processor: dual Cortex-M33 (Armv8-M,
# TrustZone-M), on-chip flash + SRAM, no MMU/Linux. It boots a bare-metal / RTOS
# firmware ELF straight from the vector table — Zephyr and NXP MCUXpresso images
# both work. Modeled + reported by the mcxn947qemu emulator session (source of
# truth); transcribed here per the Prime Directive (Holobench never edits its repo).
#
# MCU-shaped deltas from the i.MX profiles, all standard QEMU interfaces:
#   - boot mode firmware-elf -> `-kernel fw.elf` only (NO -dtb/-initrd/-append).
#     A single -kernel boots cpu0 from flash@0x10000000; cpu0 firmware releases
#     cpu1 in-guest via SYSCON CPBOOT/CPUCTRL (no second loader, no cpu-num).
#   - memory: null -> NO -m. The SoC owns its RAM (flash@0x10000000, SRAM@0x20000000,
#     default_ram_size=0); passing -m is ignored, so we omit it.
#   - display disabled (no LCDIF/DPU/scanout) -> no LCD tab, screendump N/A.
#   - one LPUART4 console (serial_hd(0)); driven over a standard -serial chardev.
#     (Holobench launches -display none + -serial chardev — never -nographic, which
#     would let the monitor grab stdio.)
#
# Boot artifacts are absolute paths to images the emulator session staged stable.
# "Push a new firmware" maps to file-injection/Reinstall later; for now the default
# firmware is the Zephyr hello_world smoke. Swap artifacts.firmware to run another
# ELF (e.g. /home/kyle/mcxn-images/mcxn-blinky.elf for the live LED-toggle demo).
#
# qemu.binary is the branch-mcxn947 fork build (not in the i.MX container images);
# override with HOLOBENCH_QEMU. Known-good QMP: query-status, query-cpus-fast
# (shows 2x cortex-m33), system_reset, stop, cont, quit.

id:           mcxn947-evk
display_name: "NXP MCXN947 (FRDM, dual M33)"
soc:          "NXP MCXN947"
description:  "Dual Cortex-M33 MCU — boots a bare-metal/RTOS firmware ELF (Zephyr/MCUXpresso). Console + gdb; no display."

qemu:
  binary:  /home/kyle/Documents/GitHub/mcxn947qemu/build/qemu-system-arm
  machine: frdm-mcxn947
  memory:  null                 # SoC owns flash+SRAM; default_ram_size=0 -> omit -m
  audio:   none
  extra_args: []

boot:
  mode: firmware-elf
  artifacts:
    firmware: /home/kyle/mcxn-images/mcxn-hello.elf   # Zephyr hello_world (smoke). Swap for another ELF.
    kernel:   null
    dtb:      null
    initrd:   null
    rootfs:   null
    disk:     null
  append: null
  command_template: null

serial:
  - { name: "LPUART4 console", chardev: console0, role: mcu-console, default: true }

display: { enabled: false, device: null, vnc: false }

# FRDM-MCXN947 RGB user LED (facts from mcxn947qemu). All ACTIVE-LOW (PDOR bit 0
# = LED ON). PDOR = GPIO_base + 0x40; read live via stock HMP `xp` (side-effect-
# free, no halt, no model change).
#
# enable_reg = PDDR (data-direction reg) = GPIO_base + 0x54 (RGPIO map: PDOR 0x40,
# PSOR 0x44, PCOR 0x48, PTOR 0x4C, PDIR 0x50, PDDR 0x54). The model only drives a
# pin's output line when its PDDR bit=1, so we gate the active-low read on PDDR:
# an UNDRIVEN pin (PDDR bit 0) reads OFF instead of falsely lighting (active-low
# PDOR default 0 would otherwise show "on"). Both PDOR and PDDR reads are
# side-effect-free (no clear-on-read, no halt). VERIFIED with mcxn-blinky.elf:
# blinky sets PDDR bit10=1 and toggles PDOR bit10 ~1Hz -> Red lights/clears live;
# green/blue PDDR bits stay 0 -> dark, matching the physical board. Zero model
# changes. (Secondary signal if ever needed: PORT PCR mux at PORT_base+pin*4.)
leds:
  - { name: "Red",   color: "#ef4444", source: gpio, reg: 0x40096040, bit: 10, active_high: false, enable_reg: 0x40096054, enable_bit: 10 }
  - { name: "Green", color: "#22c55e", source: gpio, reg: 0x40096040, bit: 27, active_high: false, enable_reg: 0x40096054, enable_bit: 27 }
  - { name: "Blue",  color: "#3b82f6", source: gpio, reg: 0x40098040, bit: 2,  active_high: false, enable_reg: 0x40098054, enable_bit: 2 }

net: { user_nics: 0, fabric_nic_model: mcxn-enet }   # ENET-QoS for v3.0 eth labs

# v3.0 USB fabric: MCXN947 is the USB *device* (exporter). The model binds its
# HS usbredir core to a chardev with the WELL-KNOWN id `mcxn-usbhs` (mcxn-usbfs
# for the FS/KHCI core) — that fixed id IS the binding, so no -device/-global is
# needed; holobench just supplies the listening -chardev (100% stock). The i.MX93
# host connects as the usb-redir client. Enumerates the vendor gadget (1FC9:0094)
# at HIGH speed end-to-end — confirmed M4-green on the bus (2026-06-30). {path} is
# the coordinator's per-link socket. (The CDC-ACM gateway-lab device uses the
# mcxn947-usb-device profile; this vendor-gadget role stays for the M4 bring-up.)
# NOTE: the HS gadget firmware lives in the mcx repo (tests/mcxn-usb-link); the
# default mcxn947-evk boot artifact is NOT that gadget — see the launch caveat.
usb:
  device:
    chardev: "socket,id=mcxn-usbhs,path={path},server=on,wait=off"

file_injection:
  nine_p: { enabled: false, mount_tag: holobench }
  tftp:   { enabled: false }
  nfs:    { enabled: false }
  image_swap: { enabled: false, target_drive: null }

power: { warm_reset: true, cold_cycle: true, pause: true, reinstall: false }

introspection:
  qmp_events: true
  memory_map: true
  device_tree: true
  gdbstub: { enabled: true }
  snapshots: false

reservation: { default_minutes: 30, max_minutes: 120 }
