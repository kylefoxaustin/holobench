# Holobench board profile — NXP i.MX 95 EVK as the LINUX SENDER of the SPI link lab.
#
# ⭐ THE SECOND LAB THAT COULD NOT PASS, FOUND BY FIXING THE FIRST.
#
# labs/spi-link-95-mcx.yaml pointed at `imx95-evk-sd` — the full Yocto SD image: systemd, a
# login prompt, and NOBODY DRIVING /dev/spidev0.0. The MCX asserts "SPI LINK PASS" /
# "SPI LINK FAIL" against a pattern it must RECEIVE, so with nothing sending, it could only
# ever print its banner. Identical shape to can-link-95-mcx: the bus was wired correctly,
# both boards booted, and the lab COULD NOT PASS.
#
#   ⭐ A LAB THAT CANNOT PASS IS NOT A FAILING LAB. IT IS ONE NOBODY RAN TO THE END.
#
# WHAT THE MCX ACTUALLY WANTS — read from ITS SOURCE (mcxn947qemu tests/mcxn-spi-link/main.c),
# not from a filename or a comment. It is the LPSPI *master*: it clocks 0x5A out forever and
# reads the peer's bytes back in, hunting a frame — a 0xA5 MARKER, then N=32 payload bytes
# where expect(i) = (i*3 + 5) & 0x7F. 0xFF means "spi-link FIFO empty" and is skipped.
#
# So the 95 must put exactly these 33 bytes on the wire, contiguously:
#     A5 05 08 0B 0E 11 14 17 1A 1D 20 23 26 29 2C 2F 32 35 38 3B 3E 41 44 47 4A 4D 50 53
#     56 59 5C 5F 62
#
# NOT spilink's default text payload. That would clock a perfectly valid stream of the WRONG
# BYTES; the MCX would resync forever and print nothing, and the lab would look like a broken
# SPI model rather than two programs that never agreed on the bytes.
#
#   ⭐ TWO PROGRAMS THAT BOTH "WORK" AND NEVER AGREE ON THE BYTES — the same interop bug the
#     fleet spent the night on over Ethernet (rt1180's magic vs everyone else's), one wire down.
#
# NO KERNEL MODULES. CONFIG_SPI_FSL_LPSPI=y and CONFIG_SPI_SPIDEV=y on this kernel, and the
# spilink dtb flips spi@42710000/spi@0 from `lwn,bk4` to `rohm,dh2228fv` — the compatible
# spidev binds — so /dev/spidev0.0 appears on its own. Verified by PARSING the dtb, because
# in the CAN task a missing `dtc` and a wrong dtb produced the same empty output, twice.
#
# WHY THE NODE HOLDS INSTEAD OF POWERING OFF: a node that powers itself off is a session that
# vanishes underneath the coordinator, and it makes "this node left" and "this node crashed"
# THE SAME OBSERVATION. Departure is the coordinator's, over QMP, at a time it chose.
#
# The 95's spilink.c is compiled VERBATIM and READ-ONLY (CLAUDE.md §7); the frame is built by
# tools/make-spi-lab-initramfs.sh and shipped as raw bytes, never as an escape sequence.

id:           imx95-evk-spi-lab
display_name: "NXP i.MX 95 EVK (Linux spidev sender — SPI link lab)"
soc:          "NXP i.MX 95"
description:  "i.MX 95 Linux node that drives /dev/spidev0.0 and sends the MCX the frame it is actually waiting for — the sender the SPI lab never had."

qemu:
  binary:  /home/kyle/Documents/GitHub/95emulator/build/qemu-system-aarch64
  machine: imx95-19x19-evk
  memory:  "2G"
  audio:   none
  extra_args:
    # LOAD-BEARING M33 System Manager (serves SCMI; the A55 will not boot without it).
    - "-device"
    - "loader,file={asset_dir}/m33_image_M2.elf,cpu-num=6"

boot:
  mode: direct-kernel
  artifacts:
    kernel:  Image
    dtb:     imx95-19x19-evk-spilink.dtb   # spi.link.attach_dtb re-applies this; kept as base
    initrd:  spi-lab.cpio.gz               # busybox + the 95's spilink + the MCX's frame
    rootfs:  null
    disk:    null
  append: "console=ttyLP0,115200 cpuidle.off=1 rdinit=/init"
  command_template: null

  # md5 PIN — a mismatch REFUSES TO LAUNCH. Regenerate with tools/make-spi-lab-initramfs.sh.
  pin:
    initrd: "81cabdd78745c3f17e5b124ca5d11c36"

serial:
  - { name: "A-core console (SPI-LAB output lands here)", chardev: console0, role: a-core, default: true }
  - { name: "M33 System Manager", chardev: smconsole, role: m-core, default: false }

display: { enabled: false, device: null, vnc: false }

net: { user_nics: 0 }

# SPI: LPSPI7 (spi@42710000) -> /dev/spidev0.0 via the spilink dtb's rohm,dh2228fv child.
spi:
  link:
    device:     "spi-link,bus=lpspi7,chardev={id}"
    chardev:    "socket,id={id},path={path}"   # coordinator adds server=on,wait=off / reconnect
    attach_dtb: imx95-19x19-evk-spilink.dtb
    dev:        "/dev/spidev0.0"

file_injection:
  nine_p: { enabled: false, mount_tag: holobench }
  tftp:   { enabled: false }
  nfs:    { enabled: false }
  image_swap: { enabled: false, target_drive: null }

power: { warm_reset: true, cold_cycle: true, pause: true, reinstall: false }

introspection:
  qmp_events: true
  memory_map: true
  device_tree: true
  gdbstub: { enabled: true }
  snapshots: false

reservation: { default_minutes: 30, max_minutes: 120 }
