# Holobench board profile — NXP i.MX RT1180 EVK as an ETHERNET (NETC) lab node.
#
# The rt1180's second face. imxrt1180-evk-uart-device onboarded it as a UART peer;
# this profile puts it on a shared L2 segment as the 0x88B6 node of the fleet's
# three-node raw-Ethernet lab (mcx 0x88B5 + rt1180 0x88B6 + imx95 0x88B7).
#
# FACTS (rt1180emulator, tools/netc-eth-lab3.sh — its own verified launch line):
#   qemu-system-arm -M mimxrt1180-evk -display none -monitor none \
#     -semihosting-config enable=on,target=native \
#     -kernel node-rt1180.elf \
#     -nic socket,mcast=<group>,mac=54:27:8d:00:00:00
# NOTE there is NO `model=` on the -nic: the machine auto-attaches its NETC. That
# is their line, verbatim, and it is what worked — so fabric_nic_model stays null.
#
# CONSOLE — CORRECTING THIS REPO'S OWN EARLIER NOTE. The uart-device profile says the
# rt1180 "prints via ARM SEMIHOSTING". That is true of the uartlink firmware and FALSE
# of this one. Verified by booting the ELF and reading both sinks:
#     QEMU stdout (semihosting) ->   0 bytes
#     LPUART   (serial_hd(0))   -> 158 bytes, incl. the ENET-LAB3 banner
# So the NETC node's console is a NORMAL chardev on serial_hd(0), and holobench taps
# it the ordinary way. Semihosting is left enabled only because it is in their
# verified line. (A board fact is per-FIRMWARE, not per-board.)
#
# PERSISTENT — the reason this node is farm-safe. The firmware broadcasts 0x88B6
# forever, ignores its OWN ethertype on RX (a mcast socket hands your broadcast back
# to you; count it and you "see a peer" that is yourself), announces PASS once on
# seeing BOTH peers, and KEEPS GOING. No SYS_EXIT. A run-once self-test that exits on
# PASS terminates QEMU and holobench's QMP connect is refused even though the link
# passed — that is what bit the UART onboarding.
#
# ARTIFACT — the emulator repo's own COMMITTED binary. Originally we staged a copy, because
# their build recipe patched the MCUXpresso SDK at run time and dropped the ELF in /tmp
# (wiped on reboot). They agreed that was a real gap and committed it: "A REPRODUCIBLE BUILD
# RECIPE IS NOT A DELIVERABLE" — a board farm has neither the SDK nor any reason to trust a
# binary that did not exist five seconds ago.
#
# ⚠️  AND THIS COMMENT IS WHY boot.pin EXISTS. It used to name two md5s — the first green run's
# binary (63c3a2e8) and the first committed one (e6a636df) — and asserted they were the same
# bits. BOTH ARE NOW STALE. The ELF has been recommitted THREE TIMES since (the seq/freshness
# work, then b3bb27d0c4 which fixed rt1180's CORRUPT token so this repo's scorer can actually
# see it). Nothing warned us. The profile went on describing a binary that had not existed for
# hours, in a comment written specifically to establish provenance.
#
#   ⭐ A COMMENT ABOUT A HASH IS A HASH NOBODY CHECKS. The pin below is the same claim, made to
#     the LAUNCHER instead of the reader — and a mismatch REFUSES TO LAUNCH.
#
# Current pin = the COMMITTED blob at rt1180emulator 5b38f62852, staged (never their worktree).
#
# ⭐ AND THIS NODE IS NOW FIXED ON ALL THREE COUNTS THE 4-NODE LAB FOUND (2026-07-14):
#   1. THE MAGIC. It spoke `"LB3!"` where mcx and 91 both speak 0xB5B6B7C0 at [14..17], so it
#      rejected EVERY peer and every peer rejected it. Their own diagnosis of why nothing they
#      owned could catch it is the sharpest thing in this repo's history:
#        ⭐ "A REHEARSAL WHOSE OTHER ACTORS ARE COPIES OF YOU CANNOT DISCOVER THAT YOU DISAGREE
#          WITH ANYONE. IT CAN ONLY DISCOVER THAT YOU DISAGREE WITH YOURSELF."
#      Their self-check built three stand-ins from the same patch. All three spoke "LB3!". All
#      three agreed. Green for weeks, on a wire the node only APPEARED to be sharing.
#   2. IPv6. Its detector cried CORRUPT at Linux NDP frames. It now judges only the ethertypes
#      it contracted to observe; imx91's 0x88B8 is a fleet node but not ITS peer, and is
#      therefore none of its business.
#   3. SELF-ARMING. It enforced the body unconditionally and deadlocked to zero. It now degrades
#      to PRESENCE for a peer that has never emitted the body, and only condemns one that has
#      PROVEN it can — so its CORRUPT is trustworthy and its scorer entry is enforceable.
#
# AND IT NOW DECLARES ITS CONTRACT in the ratified grammar (the `up:` lowercase banner is gone):
#   ENET-LAB3 UP: ethertype=0x88B6 peers=2 body=emit enforce=self-arming if=netc0 mac=...
# so the emit-status board is DERIVED from the wire and nobody maintains one.
#
# ⚠️  AND THEY CORRECTED AN INSTRUMENT OF MINE, WHICH IS THE PART TO REMEMBER. To prove the
# magic mismatch I grepped their ELF for 0xB5B6B7C0 in both endiannesses and found nothing.
# THAT CHECK CANNOT WORK: the compiler emits the constant as four byte-immediates
# (`movs r3,#0xB5` ...), so the word never appears in the binary AT ALL — A CORRECT NODE WOULD
# ALSO FAIL THAT GREP. My conclusion was right by luck; the instrument would have lied to me in
# the other direction the moment they fixed it.
#   ⭐ A FINDING READ FROM THE SUBJECT SURVIVES A BUG IN THE OBSERVER. ONE READ FROM THE
#     OBSERVER DOES NOT. The magic must be asserted OFF THE WIRE, never out of the binary.

id:           imxrt1180-evk-netc
display_name: "NXP i.MX RT1180 EVK (NETC Ethernet node, 0x88B6)"
soc:          "NXP i.MX RT1180 (Cortex-M7 + Cortex-M33)"
description:  "i.MX RT1180 on a shared L2 segment — beacons ethertype 0x88B6 forever, PASSes only on seeing BOTH peers."

qemu:
  binary:  /home/kyle/Documents/GitHub/rt1180emulator/build/qemu-system-arm
  machine: mimxrt1180-evk
  memory:  null
  audio:   none
  extra_args:
    - "-semihosting-config"
    - "enable=on,target=native"
    - "-no-reboot"

  # PIN THE INVOCATION, not just the binary (tools/argv-pin.py). A RUNNER IS PART OF THE
  # ARTIFACT: every artifact hash can still match while a flag appears, vanishes or moves,
  # and the run goes green about a command nobody chose. A mismatch REFUSES TO LAUNCH.
  argv_pin: "15c951dd824d64894862c2ca4ceb7b09"

boot:
  mode: firmware-elf
  artifacts:
    firmware: /home/kyle/holobench-images/enet-lab3/netc-lab3-0x88B6.elf
    kernel:   null
    dtb:      null
    initrd:   null
    rootfs:   null
    disk:     null
  append: null
  command_template: null

  # md5 PIN — a mismatch REFUSES TO LAUNCH (see BootSpec.pin). Holobench never builds
  # these; it consumes them from repos it does not own. It cannot obey the fleet's
  # "never test a binary you did not just build" — it can only refuse to be SURPRISED.
  pin:
    firmware: "d1cf250723331204be09125f9293b9cb"

serial:
  - { name: "LPUART1 console (ENET-LAB3 output lands here)", chardev: console0, role: mcu-console, default: true }

display: { enabled: false, device: null, vnc: false }

# ⚠️  THE ONE UNDER-SPECIFIED BINDING LEFT IN THIS REPO, AND IT IS THE SAME BUG rt1180 JUST
# SHIPPED IN ITS OWN RUNNER. fabric_nic_model: null means the segment goes to WHICHEVER
# MODELED NIC QEMU ATTACHES FIRST. That is not a binding — it is a coincidence that has held.
#
# rt1180's board-farm script attached `-device tmp105` with no `bus=`, so it landed on
# whichever bus QEMU saw LAST; when new LPI2C instances were added, "last" stopped being the
# one the firmware drove, and it cost them two phantom FAILs they nearly blamed on endianness.
# THIS LINE HAS EXACTLY THAT SHAPE. rt1180 is actively developing NETC. The day their machine
# gains a second modeled NIC, this lab's segment moves to the wrong controller — and it will
# not error. It will go QUIET: a wire connected to nothing, and a node that simply never sees
# a peer, which reads as a wire bug in someone else's model.
#
# EVERY OTHER BOARD IN THIS LAB NEEDED AN EXPLICIT model= FOR PRECISELY THIS REASON — the
# i.MX91's auto-attach grabbed the EQOS instead of the FEC; the i.MX95's grabbed a convenience
# NIC instead of ENETC. rt1180 is the only one still relying on the coincidence, and the only
# reason is that I copied their verified line and it worked.
#
#   ⭐ "IT WORKED WHEN I COPIED IT" IS THE REASONING THAT LETS A RUNNER ROT.
#
# ASKED on the bus (not guessed here, per CLAUDE.md §7): what is the NETC's `model=` string?
# The moment they answer, this becomes explicit and the coincidence stops being load-bearing.
net: { user_nics: 0, fabric_nic_model: null }

file_injection:
  nine_p: { enabled: false, mount_tag: holobench }
  tftp:   { enabled: false }
  nfs:    { enabled: false }
  image_swap: { enabled: false, target_drive: null }

power: { warm_reset: true, cold_cycle: true, pause: true, reinstall: false }

introspection:
  qmp_events: true
  memory_map: true
  device_tree: true
  gdbstub: { enabled: true }
  snapshots: false

reservation: { default_minutes: 30, max_minutes: 120 }
