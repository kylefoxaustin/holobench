# Holobench board profile — i.MX 91 EVK, BOOT FROM SD (full BSP rootfs).
#
# Unlike imx91-evk (which boots an initramfs to a shell), this boots the full
# NXP BSP root filesystem off an SD card image — the real "flashed board" flow.
# The SD image is the image-swap GOLDEN, so each session runs on a copy-on-write
# qcow2 overlay (writes isolated) and "Reinstall" drops the overlay = factory
# reset to the golden OS. No initrd: the kernel mounts root straight off the SD.
#
# assets/imx91-evk-sd/: Image + dtb (symlinks into the BSP deploy) and disk.wic
# (the decompressed imx-image-core .wic SD image, the golden).
#
# root= partition: set to the wic's rootfs partition (verify with `fdisk -l`).

id:           imx91-evk-sd
display_name: "i.MX 91 EVK (SD boot)"
soc:          "i.MX 91"
description:  "Cortex-A55, full BSP rootfs booted from SD. Reinstall = factory reset."

qemu:
  binary:  /home/kyle/Documents/GitHub/91emulator/build/qemu-system-aarch64
  machine: imx91-11x11-evk
  memory:  "4G"
  smp:     1
  audio:   none
  extra_args: ["-serial", "null"]

boot:
  mode: direct-kernel
  artifacts:
    flash_bin: null
    kernel:    Image
    dtb:       imx91-11x11-evk.dtb
    initrd:    null                 # no initramfs — root comes from the SD
    rootfs:    null
    disk:      disk.wic             # golden SD image (image-swap overlay-backed)
  # systemd.mount-extra auto-mounts the Holobench virtio-9p share at /mnt under
  # the full systemd distro (busybox does this in tools/init-shell; systemd
  # ignores that, so we declare the mount on the cmdline we own).
  append: "earlycon=lpuart32,mmio32,0x44380010 console=ttyLP0,115200 cpuidle.off=1 root=/dev/mmcblk0p2 rootwait rw systemd.mount-extra=holobench:/mnt:9p:trans=virtio,version=9p2000.L,msize=262144"
  command_template: null

serial:
  - { name: "A-core console", chardev: console0, role: a-core, default: true }

# Faithful bare EVK: the stock imx91-11x11-evk.dtb has the LCDIFv3 display
# subsystem present but NO panel ("display-subsystem: no available port", no
# /dev/fb0) — same as a real board with nothing plugged in. attach_dtb points at
# the BSP's panel-variant dtb (NXP ships it — no splice needed, unlike the 95):
# the LCDIFv3 binds a CRTC, /dev/fb0 (800x480) comes up, and the model DMAs the
# framebuffer to scanout. The UI's "Attach LCD" button swaps to it. 91 core image
# is console-only (no weston, no GPU) so the panel shows the kernel/penguin/console
# directly — no pixman config needed. (Scanout modeled + soak-validated by 91emu.)
display:
  enabled: true
  device: "lcdif"
  vnc: false
  attach_dtb: imx91-11x11-evk-tianma-wvga-panel.dtb   # BSP panel-variant dtb (Tianma WVGA)
  attach_label: "800×480 WVGA"

net: { user_nics: 2 }

# v3.0 USB fabric: i.MX91 as a USB *host* (same role as i.MX93 — shared ChipIdea
# EHCI host). Stock `-device usb-redir` importer over a reconnecting socket chardev,
# so the device end can come up first/after without a race. The imx91 binary carries
# the ChipIdea PSPD fix (bf8262fec5) + the char-socket yank fix (4-SoC green), so it
# enumerates a HS gadget at HS. 91 confirmed its host side data-proven for CDC-serial
# (run-usb-cdc.sh, 3c45b1f15d). Used by gateway-lab-91 against mcxn947-usb-device.
usb:
  host:
    chardev: "socket,id={id},path={path},server=off,reconnect-ms=2000"
    device:  "usb-redir,chardev={id}"

# v3.0 UART fabric: i.MX91's spare link UART = LPUART2 (serial@44390000, DT alias
# serial1, guest /dev/ttyLP1). The base EVK dtb leaves it disabled, so a UART link
# boots imx91-11x11-evk-uartlink.dtb (generated by tools/make-uart-dtb.sh — flips
# serial@44390000 status disabled->okay; no model change). The coordinator wires
# LPUART2 as serial_hd(1) (after the ttyLP0 console) to a stock socket chardev,
# one end server one end client. Mirrors 91emulator run-uart.sh (byte-exact,
# LPUART2<->socket<->LPUART2 between two i.MX91 guests).
uart:
  link:
    chardev:    "socket,id={id},path={path}"    # coordinator appends server=on/off,wait=off
    attach_dtb: imx91-11x11-evk-uartlink.dtb
    dev:        "/dev/ttyLP1"

# v3.0 SPI fabric: i.MX91's spare LPSPI = LPSPI1 (spi@44360000). The base EVK dtb
# disables it, so an SPI link boots imx91-11x11-evk-spilink.dtb (generated by
# tools/make-spi-dtb.sh — enables lpspi1, drops its dmas (PIO model), adds a
# spidev@0 child -> guest /dev/spidev0.0). Each end is an LPSPI master with the
# model's `spi-link` SSI bridge peripheral on lpspi1, socket-bridged to the peer
# (one server, one reconnecting client). Mirrors 91emulator run-spi.sh (byte-exact,
# LPSPI<->spi-link<->socket<->spi-link<->LPSPI between two i.MX91 guests).
spi:
  link:
    device:     "spi-link,bus=lpspi1,chardev={id}"
    chardev:    "socket,id={id},path={path}"    # coordinator adds server=on,wait=off / server=off,reconnect-ms=1000
    attach_dtb: imx91-11x11-evk-spilink.dtb
    dev:        "/dev/spidev0.0"

# v3.0 CAN fabric: i.MX91's FlexCAN (flexcan2 = can0). Uses the fleet-shared generic
# can-host-chardev backend (bridges an emulated can-bus to a socket chardev — no
# host vcan/SocketCAN, no root). The stock EVK DT already enables flexcan2=can0, so
# NO overlay dtb is needed. machine_extra wires both machine can-buses to `cb` so
# whichever node the guest enumerates as can0 is on the bridged bus. Mirrors
# 91emulator run-can.sh (byte-exact CAN frame between two i.MX91 guests).
can:
  link:
    bus:           "can-bus,id=cb"
    chardev:       "socket,id={id},path={path}"    # coordinator adds server=on/off,reconnect-ms=1000
    host:          "can-host-chardev,id=canh,canbus=cb,chardev={id}"
    machine_extra: "canbus0=cb,canbus1=cb"
    dev:           "can0"

file_injection:
  nine_p: { enabled: true, mount_tag: holobench, device: virtio-9p-device }
  tftp:   { enabled: true }
  nfs:    { enabled: false }
  image_swap: { enabled: true, target_drive: sd }   # overlay over disk.wic golden

# Virtual camera — feed host frames through the ISI -> guest /dev/video0.
# 91 uses the SHARED imx93.isi model (type "imx93.isi", NOT imx91.isi). Facts
# validated byte-exact by 91emulator: mt9m114 dtb, 1280x720x3 (=2764800 B), no
# sensor -device needed (the ISI streams without the subdev). Capture needs the
# bundled GPL-2.0 helper (imx-image-core ships no media-ctl/v4l2-ctl/v4l2src).
# Armed only when frames are staged (empty frames dir is fatal); stage + reboot.
camera:
  enabled: true
  isi_type: "imx93.isi"
  dtb: imx91-11x11-evk-mt9m114.dtb         # mt9m114 sensor wired to CSI->ISI (deploy artifact)
  width: 1280
  height: 720
  bytes_per_pixel: 3                       # used=2764800 (validated byte-exact)
  pixel_format: "RGB24"                    # informational; trust guest G_FMT/stride
  runtime_settable: false                  # LAUNCH-ONLY: stage frames, then (re)boot
  capture_binary: imx91-isi-capture        # GPL-2.0 static helper, staged into /mnt
  capture_hint: "Stage 1280x720 frames (2764800 B), reboot, then in the console run: /mnt/imx91-isi-capture cap /dev/video0  (single-pipe ISI; the helper sets up the media links + DQBUFs to ./frame*.raw)"

power: { warm_reset: true, cold_cycle: true, pause: true, reinstall: true }

introspection:
  qmp_events: true
  memory_map: true
  device_tree: true
  gdbstub: { enabled: true }
  snapshots: true

reservation: { default_minutes: 60, max_minutes: 240 }
