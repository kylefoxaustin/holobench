# Holobench board profile — NXP MCXN947 (FRDM), ENET L2-lab variant.
#
# Identical to mcxn947-evk EXCEPT it boots the mcxn947 session's ENET-QoS L2
# emitter firmware (mcxn-enet-lab.elf) instead of the hello smoke, for the
# v3.0 mcx93-eth Ethernet lab (M1 raw-L2). The firmware brings up the ENET-QoS
# MAC + descriptor rings and periodically broadcasts a 64-byte ethertype-0x88B5
# frame (src MAC 02:4d:43:58:00:01, payload "MCX"); on RX it prints
# "ENET-LAB rx: ethertype 0x88b5 src <mac>" to LPUART4. NO model/BSP change — just
# which firmware -kernel loads (a board-software choice, stock interface).

id:           mcxn947-enet
display_name: "NXP MCXN947 (FRDM, ENET L2 lab)"
soc:          "NXP MCXN947"
description:  "MCXN947 booting the ENET-QoS L2 emitter (0x88B5) for the mcx93-eth Ethernet lab."

qemu:
  binary:  /home/kyle/Documents/GitHub/mcxn947qemu/build/qemu-system-arm
  machine: frdm-mcxn947
  memory:  null
  audio:   none
  extra_args: []

boot:
  mode: firmware-elf
  artifacts:
    firmware: /home/kyle/mcxn-images/mcxn-enet-lab.elf   # ENET-QoS L2 emitter (0x88B5)
    kernel:   null
    dtb:      null
    initrd:   null
    rootfs:   null
    disk:     null
  append: null
  command_template: null

serial:
  - { name: "LPUART4 console", chardev: console0, role: mcu-console, default: true }

display: { enabled: false, device: null, vnc: false }

net: { user_nics: 0, fabric_nic_model: mcxn-enet }   # ENET-QoS for v3.0 eth labs

file_injection:
  nine_p: { enabled: false, mount_tag: holobench }
  tftp:   { enabled: false }
  nfs:    { enabled: false }
  image_swap: { enabled: false, target_drive: null }

power: { warm_reset: true, cold_cycle: true, pause: true, reinstall: false }

introspection:
  qmp_events: true
  memory_map: true
  device_tree: true
  gdbstub: { enabled: true }
  snapshots: false

reservation: { default_minutes: 30, max_minutes: 120 }
