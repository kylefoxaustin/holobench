# Holobench board profile — i.MX 93 EVK, BOOT FROM SD (full BSP distro).
#
# Full-Linux counterpart to imx93-evk (busybox initramfs). Boots the NXP
# imx-image-core rootfs off the BSP .wic — full systemd userspace. The wic is the
# image-swap GOLDEN, so each session runs on a copy-on-write overlay and Reinstall
# = factory reset. Same recipe as imx91-evk-sd (SD card -> /dev/mmcblk0), plus the
# 93's fixed 2xA55+1xM33 topology (-smp 3).
#
# Assets (assets/imx93-evk-sd/): Image + imx93-11x11-evk.dtb (symlinks into the
# BSP deploy) and disk.wic (decompressed imx-image-core .wic; p2 = ext4 root).

id:           imx93-evk-sd
display_name: "i.MX 93 EVK (SD boot, full distro)"
soc:          "i.MX 93"
description:  "2x Cortex-A55 + M33, full BSP distro from SD. Reinstall = factory reset."

qemu:
  binary:  /home/kyle/Documents/GitHub/93emulator/build-imx93/qemu-system-aarch64
  machine: imx93-11x11-evk
  memory:  "4G"
  smp:     3                        # fixed topology: 2x A55 + 1x M33 (model requires 3)
  audio:   none
  extra_args: ["-serial", "null"]

boot:
  mode: direct-kernel
  artifacts:
    flash_bin: null
    kernel:    Image
    dtb:       imx93-11x11-evk.dtb
    initrd:    null                 # no initramfs — root comes from the SD wic
    rootfs:    null
    disk:      disk.wic             # golden imx-image-core SD image (overlay-backed)
  # systemd.mount-extra auto-mounts the Holobench virtio-9p share at /mnt under
  # the full systemd distro (busybox does this in tools/init-shell; systemd
  # ignores that, so we declare the mount on the cmdline we own).
  append: "console=ttyLP0,115200 cpuidle.off=1 root=/dev/mmcblk0p2 rootwait rw systemd.mount-extra=holobench:/mnt:9p:trans=virtio,version=9p2000.L,msize=262144"
  command_template: null

serial:
  - { name: "A-core console", chardev: console0, role: a-core, default: true }

# Faithful bare EVK: stock imx93-11x11-evk.dtb has the LCDIFv3 display subsystem
# but NO panel -> no /dev/fb0 (bare board, nothing plugged in). attach_dtb = the
# BSP's panel-attached dtb (no splice needed, like the 91): "Attach LCD" swaps to
# it -> LCDIFv3 -> dw-mipi-dsi -> Raydium RM67199, /dev/fb0 1080x1920 scans out.
# (Scanout modeled + 24h-soak-validated by 93emu.) This golden runs weston and
# paints a real 1080x1920 desktop with NO pixman edit needed (it already
# software-renders — the 93 has no GPU, same as 95/91). Give it ~25s post-login to
# paint. Validated end-to-end: fb0 + dw-mipi-dsi bound + a rendered Weston desktop.
display:
  enabled: true
  device: "lcdif"
  vnc: false
  attach_dtb: imx93-11x11-evk-rm67199.dtb   # BSP panel dtb (Raydium RM67199 MIPI-DSI)
  attach_label: "1080×1920 DSI"

net: { user_nics: 1, fabric_nic_model: imx.enet }   # FEC (not the eQOS stub) for v3.0 eth labs

# v3.0 USB fabric: i.MX93 is the USB *host*. Stock `-device usb-redir` importer
# over a unix-socket chardev that reconnects, so the device end (MCXN947) can be
# launched first/after without a race. Pure upstream interfaces (Prime Directive).
# Confirmed transport from the 93<->MCX M4 bring-up on the bus. {id}/{path} are
# filled by the LabCoordinator per usb link. Validated end-to-end 2026-07-02
# (this host enumerates the MCXN947 CDC gadget at HS, binds /dev/ttyACM0).
usb:
  host:
    chardev: "socket,id={id},path={path},server=off,reconnect-ms=2000"
    device:  "usb-redir,chardev={id}"

# v3.0 board-to-board links (facts from 93emulator, bus 2026-07-04 — it authored all
# six imx93 interconnect harnesses). Node addresses match i.MX91 (same i.MX9 family),
# so the imx93 overlays are generated by the same tools/make-{spi,uart,can}-dtb.sh
# with the imx93 dtc + base dtb. NOTE: UART link is DEFERRED — LPUART2 is serial_hd(1)
# but this profile's `-serial null` (M33 pad) already occupies that slot; needs the
# serial topology resolved with 93 before wiring uart-link-93.

# SPI: LPSPI1 (spi@44360000) -> /dev/spidev0.0. Overlay flips status okay + adds a
# spidev@0 child + drops dmas (imx93 LPSPI runs PIO).
spi:
  link:
    device:     "spi-link,bus=lpspi1,chardev={id}"
    chardev:    "socket,id={id},path={path}"    # coordinator adds server=on,wait=off / server=off,reconnect-ms=1000
    attach_dtb: imx93-11x11-evk-spilink.dtb
    dev:        "/dev/spidev0.0"

# CAN: FlexCAN -> can0. Both flexcan1/2 enabled via the overlay (dummy always-on
# xceiver regulator; the real one is behind an unmodeled i2c expander). Wire BOTH
# can-buses (canbus0=cb,canbus1=cb) — Linux may enumerate either flexcan as can0.
# Needs flexcan/can-dev/can-raw modules (BSP, insmod in-guest).
can:
  link:
    bus:           "can-bus,id=cb"
    chardev:       "socket,id={id},path={path}"    # coordinator adds server=on/off,reconnect-ms=1000
    host:          "can-host-chardev,id=canh,canbus=cb,chardev={id}"
    machine_extra: "canbus0=cb,canbus1=cb"
    attach_dtb:    imx93-11x11-evk-canlink.dtb
    dev:           "can0"

# I2C: LPI2C3 (i2c@42530000) -> /dev/i2c-N. STOCK dtb enables LPI2C3 + i2c-dev is
# builtin, so NO overlay — the simplest link (i2c-link is 93-authored).
i2c:
  link:
    device:  "i2c-link,bus=lpi2c3,address=0x42,chardev={id}"
    chardev: "socket,id={id},path={path}"    # coordinator adds server=on,wait=off / server=off,reconnect-ms=1000
    dev:     "/dev/i2c-N (LPI2C3 @ i2c@42530000)"

file_injection:
  nine_p: { enabled: true, mount_tag: holobench, device: virtio-9p-device }
  tftp:   { enabled: true }
  nfs:    { enabled: false }
  image_swap: { enabled: true, target_drive: sd }   # 93 roots from an SD card (mmcblk0)

# Virtual camera — feed host frames through the ISI -> guest /dev/video0.
# Shared imx93.isi model. Uses the mt9m114 sensor: it's BUILT-IN in the 93 kernel
# (CONFIG_VIDEO_MT9M114X=y), so it binds at boot -> /dev/media0 appears with no
# module/insmod (turnkey, same as the 91). Geometry 1280x720x3 (same sensor model
# as the 91). Capture needs the bundled GPL-2.0 helper (imx-image-core ships no
# media-ctl/v4l2-ctl/v4l2src). Armed only when frames are staged; stage + reboot.
# (An ov5640 path exists too — imx93-11x11-frdm-ov5640.dtb @ 640x480x6 — but ov5640
# is a module not in the core rootfs, so mt9m114-builtin is the turnkey choice.)
camera:
  enabled: true
  isi_type: "imx93.isi"
  dtb: imx93-11x11-evk-mt9m114.dtb         # mt9m114 sensor (built-in driver) wired to CSI->ISI
  width: 1280
  height: 720
  bytes_per_pixel: 3                       # 1280x720x3 = 2764800 (same sensor as 91)
  pixel_format: "RGB24"                    # informational; trust guest G_FMT/stride
  runtime_settable: false                  # LAUNCH-ONLY: stage frames, then (re)boot
  capture_binary: imx93-isi-capture        # GPL-2.0 static helper, staged into /mnt
  capture_hint: "Stage 1280x720 frames (2764800 B), reboot, then in the console: /mnt/imx93-isi-capture cap /dev/video0  (mt9m114 is built-in; the helper sets up the media links + DQBUFs to ./frame*.raw)"

power: { warm_reset: true, cold_cycle: true, pause: true, reinstall: true }

introspection:
  qmp_events: true
  memory_map: true
  device_tree: true
  gdbstub: { enabled: true }
  snapshots: true

reservation: { default_minutes: 60, max_minutes: 240 }
