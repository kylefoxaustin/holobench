# Holobench board profile — i.MX 93 EVK, BOOT FROM SD (full BSP distro).
#
# Full-Linux counterpart to imx93-evk (busybox initramfs). Boots the NXP
# imx-image-core rootfs off the BSP .wic — full systemd userspace. The wic is the
# image-swap GOLDEN, so each session runs on a copy-on-write overlay and Reinstall
# = factory reset. Same recipe as imx91-evk-sd (SD card -> /dev/mmcblk0), plus the
# 93's fixed 2xA55+1xM33 topology (-smp 3).
#
# Assets (assets/imx93-evk-sd/): Image + imx93-11x11-evk.dtb (symlinks into the
# BSP deploy) and disk.wic (decompressed imx-image-core .wic; p2 = ext4 root).

id:           imx93-evk-sd
display_name: "i.MX 93 EVK (SD boot, full distro)"
soc:          "i.MX 93"
description:  "2x Cortex-A55 + M33, full BSP distro from SD. Reinstall = factory reset."

qemu:
  binary:  /home/kyle/Documents/GitHub/93emulator/build-imx93/qemu-system-aarch64
  machine: imx93-11x11-evk
  memory:  "4G"
  smp:     3                        # fixed topology: 2x A55 + 1x M33 (model requires 3)
  audio:   none
  extra_args: ["-serial", "null"]

boot:
  mode: direct-kernel
  artifacts:
    flash_bin: null
    kernel:    Image
    dtb:       imx93-11x11-evk.dtb
    initrd:    null                 # no initramfs — root comes from the SD wic
    rootfs:    null
    disk:      disk.wic             # golden imx-image-core SD image (overlay-backed)
  # systemd.mount-extra auto-mounts the Holobench virtio-9p share at /mnt under
  # the full systemd distro (busybox does this in tools/init-shell; systemd
  # ignores that, so we declare the mount on the cmdline we own).
  append: "console=ttyLP0,115200 cpuidle.off=1 root=/dev/mmcblk0p2 rootwait rw systemd.mount-extra=holobench:/mnt:9p:trans=virtio,version=9p2000.L,msize=262144"
  command_template: null

serial:
  - { name: "A-core console", chardev: console0, role: a-core, default: true }

display: { enabled: true, device: "lcdif", vnc: false }

net: { user_nics: 1 }

file_injection:
  nine_p: { enabled: true, mount_tag: holobench, device: virtio-9p-device }
  tftp:   { enabled: true }
  nfs:    { enabled: false }
  image_swap: { enabled: true, target_drive: sd }   # 93 roots from an SD card (mmcblk0)

# Virtual camera — feed host frames through the ISI -> guest /dev/video0.
# Shared imx93.isi model. 93emulator's "safe bet": frdm-ov5640 dtb @ 640x480x6
# (=1843200 B, validated byte-exact). ov5640 is a kernel MODULE here -> the guest
# must `modprobe ov5640` before capture. Capture needs the bundled GPL-2.0 helper
# (imx-image-core ships no media-ctl/v4l2-ctl/v4l2src). Armed only when frames are
# staged (empty frames dir is fatal); stage + reboot.
camera:
  enabled: true
  isi_type: "imx93.isi"
  dtb: imx93-11x11-frdm-ov5640.dtb         # ov5640 sensor wired to CSI->ISI (deploy artifact)
  width: 640
  height: 480
  bytes_per_pixel: 6                       # validated byte-exact
  pixel_format: "YUYV"                     # informational; trust guest G_FMT/stride
  runtime_settable: false                  # LAUNCH-ONLY: stage frames, then (re)boot
  capture_binary: imx93-isi-capture        # GPL-2.0 static helper, staged into /mnt
  capture_hint: "Stage 640x480 frames (1843200 B), reboot, then in the console: modprobe ov5640 && /mnt/imx93-isi-capture cap /dev/video0  (the helper sets up the media links + DQBUFs to ./frame*.raw)"

power: { warm_reset: true, cold_cycle: true, pause: true, reinstall: true }

introspection:
  qmp_events: true
  memory_map: true
  device_tree: true
  gdbstub: { enabled: true }
  snapshots: true

reservation: { default_minutes: 60, max_minutes: 240 }
