# Holobench board profile — i.MX 95 EVK, BOOT FROM SD (full imx-image-full distro).
#
# The full-Linux counterpart to imx95-evk (which boots a minimal busybox initramfs).
# Boots the NXP imx-image-full root filesystem off the BSP .wic — full systemd
# userspace, all services, and the eIQ Neutron / Wave VPU / media tooling. The
# wic is the image-swap GOLDEN, so each session runs on a copy-on-write overlay
# and Reinstall = factory reset.
#
# Artifacts (assets/imx95-evk-sd/): Image + imx95-19x19-evk.dtb (symlinks into
# the linux-imx95 KBUILD; kernel 6.12.49-gdf24f9428e38, matches the wic modules)
# and disk.wic (the decompressed imx-image-full .wic, ~12 GiB; p2 = ext4 root).
# The wic comes from the 95 emulator's full-image soak build (build-imx95-drone-sizer).

id:           imx95-evk-sd
display_name: "i.MX 95 EVK (SD boot, full distro)"
soc:          "i.MX 95"
description:  "6x Cortex-A55 + M33 SM, full imx-image-full distro from SD. Reinstall = factory reset."

qemu:
  binary:  /home/kyle/Documents/GitHub/95emulator/build/qemu-system-aarch64
  machine: imx95-19x19-evk
  memory:  "4G"
  audio:   none
  # LOAD-BEARING M33 System Manager firmware (serves SCMI; A55 won't boot without
  # it) + null-padded 2nd LPUART.
  extra_args:
    - "-device"
    - "loader,file=/home/kyle/Documents/nxp/sources/imx-sm/build/mx95evk/m33_image.elf,cpu-num=6"
    - "-serial"
    - "null"

boot:
  mode: direct-kernel
  artifacts:
    flash_bin: null
    kernel:    Image
    dtb:       imx95-19x19-evk.dtb
    initrd:    null                 # no initramfs — root comes from the SD wic
    rootfs:    null
    disk:      disk.wic             # golden imx-image-full SD image (overlay-backed)
  # systemd.mount-extra auto-mounts the Holobench virtio-9p share at /mnt under
  # the full systemd distro (the busybox initramfs does this in tools/init-shell;
  # systemd ignores that, so we declare the mount on the cmdline we own).
  append: "console=ttyLP0,115200 cpuidle.off=1 root=/dev/mmcblk0p2 rootwait rw systemd.mount-extra=holobench:/mnt:9p:trans=virtio,version=9p2000.L,msize=262144"
  command_template: null

serial:
  - { name: "A-core console", chardev: console0, role: a-core, default: true }

display: { enabled: true, device: "dpu", vnc: false }

net: { user_nics: 1 }

file_injection:
  nine_p: { enabled: true, mount_tag: holobench, device: virtio-9p-device }
  tftp:   { enabled: true }
  nfs:    { enabled: false }
  image_swap: { enabled: true, target_drive: emmc } # 95 roots from eMMC (mmcblk0), not SD

# Virtual camera — feed host frames through the ISI so the guest captures them
# via V4L2 (/dev/video0) in place of a real sensor: -global driver=imx95.isi,
# property=frames,value=<session frames dir>. All facts confirmed + validated
# end-to-end by 95emulator (hw/display/imx95_isi.c + hw/i2c/ov5640.c) on THIS
# golden dtb: ov5640 is the only modeled sensor; it's pure graph scaffolding
# (no pixels — the ISI scans our host frames). Capture comes up at 640x480,
# bpl=3840 -> 6 bytes/px -> 1843200 bytes/frame; 5 staged frames DQBUF'd byte-
# exact. The ov5640 dtb is a standard deploy artifact 95 minted next to the
# others (golden base dtb + ov5640 overlay merged) — no test-tree coupling.
# LAUNCH-ONLY (frames read in realize(); stage-then-reboot). FORMAT-AGNOSTIC
# opaque byte copy: a frame whose size != 1843200 silently shows the gradient.
# NB the DT puts the sensor on lpi2c3 but QEMU's bus alias is "lpi2c1".
# IN-GUEST CAPTURE — the catch (95emulator validated empirically on this golden):
# the imx95 ISI is the 8-channel CROSSBAR variant, and media-ctl CANNOT satisfy
# its per-stream link_validate (the full -l/-V sequence applies but STREAMON
# EPIPEs). Capture works ONLY via a programmatic V4L2 client that does per-stream
# SUBDEV_S_FMT + link-enable + REQBUFS/STREAMON/DQBUF (95 proved it byte-exact on
# the same boot media-ctl failed). So we do NOT ship a media-ctl recipe here.
# Bundling a capture helper (3rd-party static binary vs a Holobench-authored one)
# is a coupling-posture decision for Kyle — see ROADMAP. The FEED side (this
# profile + -global frames=) is validated byte-exact; only the in-guest capture
# tool is pending that decision.
# Frame size: stage 1843200 (640x480x6) — 95's SAFE over-provision; the model
# reads min(host_frame, width*height*bpp), so 1843200 covers both the 2bpp and
# 6bpp pipe negotiations without ever tripping the short-read gradient fallback.
# (Unconfigured /dev/video0 default is 1920x1080x2; the client sets 640x480.)
camera:
  enabled: true
  isi_type: "imx95.isi"
  dtb: imx95-19x19-evk-ov5640.dtb          # golden base + ov5640 overlay (deploy artifact)
  qemu_device: "ov5640,bus=lpi2c1,address=0x3c"   # graph scaffolding (no pixels)
  width: 640
  height: 480
  bytes_per_pixel: 6                       # safe over-provision (640x480x6=1843200)
  pixel_format: "YUYV"                     # informational; trust guest G_FMT/stride
  runtime_settable: false                  # LAUNCH-ONLY: stage frames, then (re)boot
  capture_binary: imx95-isi-capture        # GPL-2.0 static helper, staged into /mnt
  guest_modules: [ov5640.ko]               # rootfs lacks the sensor driver; insmod from /mnt
  capture_hint: "Stage 640x480 frames (1843200 B), reboot, then in the console: insmod /mnt/ov5640.ko && /mnt/imx95-isi-capture cap /dev/video0  (media-ctl can't drive the 8-ch crossbar — the helper does the per-stream link setup + DQBUF; captured frames land in ./frame*.raw). Validated byte-exact."

power: { warm_reset: true, cold_cycle: true, pause: true, reinstall: true }

introspection:
  qmp_events: true
  memory_map: true
  device_tree: true
  gdbstub: { enabled: true }
  snapshots: true

reservation: { default_minutes: 60, max_minutes: 240 }
