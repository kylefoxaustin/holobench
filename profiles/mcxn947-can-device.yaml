# Holobench board profile — MCXN947 as a board-to-board CAN node (mixed-SoC CAN lab).
#
# The CAN counterpart to mcxn947-spi-device: same frdm-mcxn947 binary/machine, boots
# the bare-metal CAN-link firmware (canlink.elf). Its FlexCAN0 is wired to a
# command-line can-bus and bridged to a peer over the fleet-shared generic
# can-host-chardev backend — the SAME shape as the i.MX can.link (95's design,
# carried across the fleet). Facts from the mcxn947qemu session (bus 2026-07-03,
# commit ac150521fb+); proven cross-SoC byte-exact (95<->MCX + 91<->95 CAN).
#
#   qemu-system-arm -M frdm-mcxn947 -serial file:<console> \
#     -object can-bus,id=cb -machine canbus0=cb \
#     -chardev socket,id=canl,path=<sock>,server=on|off,reconnect-ms=1000 \
#     -object can-host-chardev,id=h0,canbus=cb,chardev=canl \
#     -kernel tests/mcxn-can-link/canlink.elf
#
# The firmware sends FlexCAN std-ID 0x321 + receives the peer's 0x322 reply,
# resend-until-connected so boot order is free (the slow Linux peer boots first).
# Success = "CAN LINK PASS" on the MCX console (serial_hd(0)). Bare-metal M33, no dtb.

id:           mcxn947-can-device
display_name: "NXP MCXN947 (CAN-link node)"
soc:          "NXP MCXN947"
description:  "MCXN947 booting the bare-metal can-link firmware (canlink.elf) — a CAN board-to-board node (FlexCAN0 over the can-host-chardev bridge)."

qemu:
  binary:  /home/kyle/Documents/GitHub/mcxn947qemu/build/qemu-system-arm
  machine: frdm-mcxn947
  memory:  null
  audio:   none
  extra_args:
    - "-no-reboot"

boot:
  mode: firmware-elf
  artifacts:
    firmware: /home/kyle/Documents/GitHub/mcxn947qemu/tests/mcxn-can-link/canlink.elf
    kernel:   null
    dtb:      null
    initrd:   null
    rootfs:   null
    disk:     null
  append: null
  command_template: null

serial:
  - { name: "LPUART4 console", chardev: console0, role: mcu-console, default: true }

display: { enabled: false, device: null, vnc: false }

net: { user_nics: 0, fabric_nic_model: mcxn-enet }

# CAN board-to-board: FlexCAN0 wired to a command-line can-bus (id=cb) via -machine
# canbus0=cb, bridged to the peer by the generic can-host-chardev over a socket.
# Same shape as the i.MX can.link — a mixed-SoC lab is a drop-in.
can:
  link:
    bus:           "can-bus,id=cb"
    chardev:       "socket,id={id},path={path}"    # coordinator adds server=on,wait=off / server=off,reconnect-ms=1000
    host:          "can-host-chardev,id=h0,canbus=cb,chardev={id}"
    machine_extra: "canbus0=cb"
    dev:           "FlexCAN0 (bare-metal, no Linux can0)"

file_injection:
  nine_p: { enabled: false, mount_tag: holobench }
  tftp:   { enabled: false }
  nfs:    { enabled: false }
  image_swap: { enabled: false, target_drive: null }

power: { warm_reset: true, cold_cycle: true, pause: true, reinstall: false }

introspection:
  qmp_events: true
  memory_map: true
  device_tree: true
  gdbstub: { enabled: true }
  snapshots: false

reservation: { default_minutes: 30, max_minutes: 120 }
