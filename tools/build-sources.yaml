# SPDX-License-Identifier: GPL-2.0-or-later
# QEMU source per board for `tools/build-me.sh` (see docs/SETUP.md).
#
# Each entry says where to get a GPL qemu that knows the board's machine type, and
# how to build it. This absorbs the fork -> upstream transition with a one-line
# edit, no code change:
#   stage 1 (now):       repo+ref = the public fork at a pinned commit
#   stage 2 (upstreamed): repo+ref = gitlab qemu-project at a release tag
#   stage 3 (in distros): replace qemu: with `stock: { min_version: "X.Y" }`
#                         -> build-me skips the compile; the image's apt qemu suffices
#
# Pinned commits verified 2026-06-16: public fork tip == local model tip. The
# emulator sessions are the source of truth — reconfirm on the bus before a release.
# system_arm = build qemu-system-arm (MCU/Cortex-M); else qemu-system-aarch64.
#
# oss_demo (optional): a fully-REDISTRIBUTABLE bootable bundle (mainline/upstream
# kernel + generic dtb + buildroot/busybox rootfs — all OSS, no NXP BSP) so a user
# with no NXP artifacts can still boot. `tools/fetch-oss-demo.sh` downloads
# url -> verifies sha256 -> extracts into the board's asset dir. The bundle's boot
# recipe (which kernel/dtb actually boots the model) is OWNED BY THE EMULATOR
# SESSION (Prime Directive §7 — never guess); url/sha256 stay empty until they
# confirm/publish one (they likely have it from the upstreaming effort). The bundle
# is built once by tools/build-oss-demo.sh and published as a GitHub release asset.

imx95-evk-sd:
  qemu: { repo: "https://github.com/kylefoxaustin/qemu-imx95.git", ref: "25223218cddcc8304594c9ad39a95341c049ca17", target_list: "aarch64-softmmu" }
  # NO OSS demo possible (95 session's verdict): the 95 boot is SCMI/SM-gated — Linux
  # needs the M33 System Manager (NXP) as its only SCMI provider, so no mainline kernel
  # boots standalone. i.MX95 is BYO-BSP only (fetch-nxp.sh); zero-NXP see-it-run is the
  # bare-metal tests/hello-imx95. Leave url empty permanently.
  oss_demo: { url: "", sha256: "" }
  # Container build (artifact source #3): NXP Yocto build params — CONFIRMED by the
  # 95 session (pinned to what the model is validated against: kernel 6.12.49-walnascar
  # + SM from imx-sm lf-6.18.2-1.0.0, the proven 3/3 set; SCMI is fwd/back compatible).
  nxp_bsp:
    machine: imx95-19x19-lpddr5-evk
    distro: fsl-imx-xwayland                   # weston desktop (matches Attach-LCD)
    manifest_branch: imx-linux-walnascar
    manifest_xml: imx-6.12.49-2.2.0.xml
    image_targets:                            # depth variants the wizard offers (first = default)
      - imx-image-full                        # + Qt/multimedia + eIQ ML (NPU lights up where present)
      - imx-image-multimedia                  # + GStreamer/weston graphics, no ML stack
      - imx-image-core                        # console + base userspace (smallest)
    dtb_name: imx95-19x19-evk.dtb
    sm_cfg: mx95evk
    sm_m: 2                                    # REQUIRED: M=1 busy-polls the debug UART (~90% host core)
    sm_tag: lf-6.18.2-1.0.0                    # proven SM (forward-compat with the 6.12.49 kernel)
imx95-evk:
  qemu: { repo: "https://github.com/kylefoxaustin/qemu-imx95.git", ref: "25223218cddcc8304594c9ad39a95341c049ca17", target_list: "aarch64-softmmu" }
  oss_demo: { url: "", sha256: "" }   # SCMI/SM-gated — no OSS demo possible; BYO-BSP only

imx93-evk-sd:
  qemu: { repo: "https://github.com/kylefoxaustin/qemu-imx93.git", ref: "951fbc893b19b63933c79accfd152e9717a7e1a8", target_list: "aarch64-softmmu" }
  oss_demo: { url: "", sha256: "" }   # pending boot recipe from the 93 emulator session
  # Container build (artifact source #3): NXP Yocto build params. MACHINE per
  # docs/wizard-prototype.html (imx93-11x11-lpddr4x-evk); same walnascar 6.12.49
  # release manifest as the 95 (one manifest covers all i.MX); dtb per the profile.
  # imx-image-full carries the eIQ/Ethos-U65 NPU runtime (core lacks it — see the
  # NPU verification). i.MX93 has NO load-bearing M33 System Manager (unlike 95),
  # so sm_cfg is empty -> the SM firmware build is skipped. Reconfirm on the bus
  # with the 93 session before a release (Prime Directive §7).
  nxp_bsp:
    machine: imx93-11x11-lpddr4x-evk
    distro: fsl-imx-xwayland                   # weston desktop (matches Attach-LCD)
    manifest_branch: imx-linux-walnascar
    manifest_xml: imx-6.12.49-2.2.0.xml
    image_targets:                            # depth variants the wizard offers (first = default)
      - imx-image-full                        # + Qt/multimedia + eIQ ML (Ethos-U65 NPU)
      - imx-image-multimedia                  # + GStreamer/weston graphics, no ML stack
      - imx-image-core                        # console + base userspace (smallest)
    dtb_name: imx93-11x11-evk.dtb
    sm_cfg: ""                                 # 93: no M33 System Manager firmware (95-only)
imx93-evk:
  qemu: { repo: "https://github.com/kylefoxaustin/qemu-imx93.git", ref: "951fbc893b19b63933c79accfd152e9717a7e1a8", target_list: "aarch64-softmmu" }
  # All-OSS boot bundle from the 93 emulator session, boot-tested on imx93-11x11-evk:
  # mainline Linux 6.12.93 (arm64 defconfig) + mainline imx93-11x11-evk.dtb + busybox
  # initramfs -> shell in ~10s, 2x A55 up, zero NXP bits. (initrd.cpio.gz = the bundle's
  # busybox rootfs, renamed to the profile's initrd name.)
  oss_demo: { url: "https://github.com/kylefoxaustin/holobench/releases/download/v0.3.0/oss-demo-imx93-evk.tar.gz", sha256: "ff0528c8a63ec7d8f0fa2ccb681fafde5079ee9d61b21236911dad080c7d4783" }

imx91-evk-sd:
  qemu: { repo: "https://github.com/kylefoxaustin/qemu-imx91.git", ref: "91b14c8cbd9b9f578b10d648f952352b58a7b11a", target_list: "aarch64-softmmu" }
  oss_demo: { url: "", sha256: "" }   # pending boot recipe from the 91 emulator session
  # Container build (artifact source #3): NXP Yocto build params. MACHINE per
  # docs/wizard-prototype.html (imx91-11x11-lpddr4-evk — note lpddr4, not lpddr4x),
  # accepted by imx-setup-release (NXP backports the 91 into walnascar; mainline only
  # has it v6.18+). Same walnascar 6.12.49 manifest; dtb per the profile. Single
  # Cortex-A55, NO M33 -> sm_cfg empty (no System Manager). imx-image-full DOES build
  # on the 91: onnxruntime is a CPU runtime and the Ethos-U NPU is an *optional*
  # execution provider, not a build dep — per-SoC MACHINE_FEATURES light up only what
  # the 91 has (CPU/ACL; no NPU). (An earlier full build tripped on onnxruntime
  # do_configure under heavy parallel memory pressure; the recipe configures + builds
  # fine in isolation, so that was environmental, not a 91 incompatibility.)
  nxp_bsp:
    machine: imx91-11x11-lpddr4-evk
    distro: fsl-imx-xwayland
    manifest_branch: imx-linux-walnascar
    manifest_xml: imx-6.12.49-2.2.0.xml
    image_targets:                            # depth variants the wizard offers (first = default)
      - imx-image-full                        # + Qt/multimedia + eIQ ML (CPU-only on 91; NPU bits gate off)
      - imx-image-multimedia                  # + GStreamer/weston graphics, no ML stack
      - imx-image-core                        # console + base userspace (smallest)
    dtb_name: imx91-11x11-evk.dtb
    sm_cfg: ""                                 # 91: single A55, no M33 -> no SM firmware
imx91-evk:
  qemu: { repo: "https://github.com/kylefoxaustin/qemu-imx91.git", ref: "91b14c8cbd9b9f578b10d648f952352b58a7b11a", target_list: "aarch64-softmmu" }
  # All-OSS boot bundle from the 91 emulator session, boot-tested on imx91-11x11-evk:
  # mainline Linux v6.18-rc3 (i.MX91 only landed post-6.17, so NOT a 6.12 LTS) + mainline
  # imx91-11x11-evk.dtb + busybox initramfs -> userspace marker + clean power-down, single
  # A55 (smp 1), zero NXP bits. (initrd.cpio.gz = the bundle's busybox rootfs renamed.)
  oss_demo: { url: "https://github.com/kylefoxaustin/holobench/releases/download/v0.3.0/oss-demo-imx91-evk.tar.gz", sha256: "712cba08e02b1f9ad2f37e8150ad6bc4d34798aeff060391f2b874c613b4dc98" }

# MCU: builds qemu-system-arm. (Holobench's container today targets the i.MX
# aarch64 boards; the MCX build-me path is here for completeness / future.)
mcxn947-evk:
  qemu: { repo: "https://github.com/kylefoxaustin/mcxn947qemu.git", ref: "53a865533662fd5de0d74b4fc28ccb75589ebae4", target_list: "arm-softmmu", system_arm: true }
