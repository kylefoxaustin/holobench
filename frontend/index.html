<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Holobench — Virtual EVK</title>
  <!-- All deps vendored locally (frontend/vendor) so Holobench runs fully offline. -->
  <script src="/vendor/tailwind.js"></script>
  <link rel="stylesheet" href="/vendor/xterm.css" />
  <!-- UMD globals: Terminal, FitAddon, React, ReactDOM, htm -->
  <script src="/vendor/xterm.js"></script>
  <script src="/vendor/addon-fit.js"></script>
  <script src="/vendor/react.js"></script>
  <script src="/vendor/react-dom.js"></script>
  <script src="/vendor/htm.js"></script>
  <style>
    html, body, #root { height: 100%; background:#0b0f17; }
    .xterm { padding: 8px; }
  </style>
</head>
<body class="h-full text-slate-200">
  <div id="root" class="h-full"></div>

  <script type="module">
    const React = window.React;
    const { useState, useEffect, useRef, useCallback } = React;
    const { createRoot } = window.ReactDOM;
    const html = window.htm.bind(React.createElement);

    let authToken = localStorage.getItem("hb_token") || null;
    const setToken = (t) => {
      authToken = t || null;
      if (t) localStorage.setItem("hb_token", t); else localStorage.removeItem("hb_token");
    };
    const authHeaders = (extra) => {
      const h = { ...(extra || {}) };
      if (authToken) h["Authorization"] = "Bearer " + authToken;
      return h;
    };
    const api = (p, opts = {}) =>
      fetch(p, { ...opts, headers: authHeaders(opts.headers) })
        .then(r => r.ok ? r.json() : r.json().then(e => Promise.reject({ ...e, status: r.status })));
    const authFetch = (p, opts = {}) => fetch(p, { ...opts, headers: authHeaders(opts.headers) });
    // For <img>/WebSocket which can't set headers — the backend also reads ?token=.
    const withToken = (url) =>
      authToken ? url + (url.includes("?") ? "&" : "?") + "token=" + encodeURIComponent(authToken) : url;

    function Console({ session, chardev }) {
      const elRef = useRef(null);
      const termRef = useRef(null);
      const wsRef = useRef(null);

      useEffect(() => {
        const term = new window.Terminal({
          convertEol: false, cursorBlink: true, fontSize: 13,
          fontFamily: "ui-monospace, SFMono-Regular, Menlo, monospace",
          theme: { background: "#0b0f17", foreground: "#cbd5e1" },
        });
        const fit = new window.FitAddon.FitAddon();
        term.loadAddon(fit);
        term.open(elRef.current);
        try { fit.fit(); } catch {}
        termRef.current = term;
        const onResize = () => { try { fit.fit(); } catch {} };
        window.addEventListener("resize", onResize);

        const proto = location.protocol === "https:" ? "wss" : "ws";
        const q = chardev ? `?chardev=${encodeURIComponent(chardev)}` : "";
        const ws = new WebSocket(withToken(`${proto}://${location.host}/api/sessions/${session.id}/console${q}`));
        ws.binaryType = "arraybuffer";
        wsRef.current = ws;
        ws.onmessage = (e) => {
          if (e.data instanceof ArrayBuffer) term.write(new Uint8Array(e.data));
          else term.write(e.data);
        };
        ws.onclose = () => term.write("\r\n\x1b[33m[holobench: console disconnected]\x1b[0m\r\n");
        const disp = term.onData((d) => { if (ws.readyState === 1) ws.send(d); });

        return () => {
          window.removeEventListener("resize", onResize);
          disp.dispose(); ws.close(); term.dispose();
        };
      }, [session.id, chardev]);

      return html`<div ref=${elRef} class="h-full w-full"></div>`;
    }

    function Display({ session, onAction, busy }) {
      const [ts, setTs] = useState(Date.now());
      useEffect(() => {
        const id = setInterval(() => setTs(Date.now()), 1500);
        return () => clearInterval(id);
      }, [session.id]);
      const src = withToken(`/api/sessions/${session.id}/screen.png?ts=${ts}`);
      const disp = session.display || {};
      const lbl = disp.attach_label ? ` (${disp.attach_label})` : "";
      return html`
        <div class="h-full flex flex-col">
          <div class="flex items-center justify-between mb-1">
            <div class="text-xs text-slate-500">LCD / framebuffer
              <span class="text-slate-600">— screendump · ~1.5s</span></div>
            ${disp.attachable && onAction && html`
              ${disp.lcd_attached
                ? html`<button disabled=${busy} onClick=${() => onAction("detach_lcd")}
                    class="px-2 py-0.5 rounded bg-slate-700 hover:bg-slate-600 text-xs disabled:opacity-50"
                    title="reboot the board with no panel (faithful bare EVK)">Detach LCD</button>`
                : html`<button disabled=${busy} onClick=${() => onAction("attach_lcd")}
                    class="px-2 py-0.5 rounded bg-emerald-700 hover:bg-emerald-600 text-xs disabled:opacity-50"
                    title="attach a panel so the DPU scans out — reboots the board">Attach LCD${lbl}</button>`}`}
          </div>
          <div class="relative flex-1 min-h-0 flex items-center justify-center bg-black rounded border border-slate-800 overflow-hidden">
            <img src=${src} alt="framebuffer" class="max-h-full max-w-full object-contain"
                 style=${{ imageRendering: "pixelated" }} />
            ${disp.attachable && !disp.lcd_attached && html`
              <div class="absolute inset-x-0 bottom-0 p-2 text-center text-[11px] text-slate-400 bg-slate-900/70">
                Bare EVK — no panel attached, so the DPU has nothing to scan out (faithful to real hardware).
                Click <span class="text-emerald-300">Attach LCD</span> to plug in a ${disp.attach_label || "panel"} and reboot.
              </div>`}
          </div>
        </div>`;
    }

    function fmtSize(n) {
      return n > 1e6 ? (n / 1e6).toFixed(1) + " MB" : n > 1e3 ? (n / 1e3).toFixed(1) + " KB" : n + " B";
    }

    function fmtDur(sec) {
      sec = Math.max(0, Math.round(sec));
      const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
      const p = (n) => String(n).padStart(2, "0");
      return h > 0 ? `${h}:${p(m)}:${p(s)}` : `${p(m)}:${p(s)}`;
    }

    function Files({ session }) {
      const [files, setFiles] = useState([]);
      const [busy, setBusy] = useState(false);
      const [drag, setDrag] = useState(false);
      const [err, setErr] = useState("");
      const inputRef = useRef(null);

      const refresh = useCallback(() => {
        api(`/api/sessions/${session.id}/files`)
          .then(d => setFiles(d.files || []))
          .catch(e => setErr(`couldn't list files: ${e.detail || e.status || e}`));
      }, [session.id]);
      useEffect(() => { refresh(); const id = setInterval(refresh, 3000); return () => clearInterval(id); }, [session.id]);

      const upload = async (list) => {
        if (!list || !list.length) return;
        setBusy(true); setErr("");
        const failed = [];
        for (const f of list) {
          const fd = new FormData(); fd.append("file", f);
          try {
            const r = await authFetch(`/api/sessions/${session.id}/files`, { method: "POST", body: fd });
            if (!r.ok) {
              const e = await r.json().catch(() => ({}));
              failed.push(`${f.name}: ${e.detail || r.status}`);
            }
          } catch (e) { failed.push(`${f.name}: ${e}`); }
        }
        setBusy(false);
        setErr(failed.length ? `upload failed — ${failed.join("; ")}` : "");
        refresh();
      };
      // Reset the input's value so picking the SAME file again still fires onChange.
      const onPick = (e) => { const fl = e.target.files; e.target.value = ""; upload(fl); };
      const del = async (name) => {
        setErr("");
        try {
          const r = await authFetch(`/api/sessions/${session.id}/files/${encodeURIComponent(name)}`, { method: "DELETE" });
          if (!r.ok) { const e = await r.json().catch(() => ({})); setErr(`delete failed: ${e.detail || r.status}`); }
        } catch (e) { setErr(`delete failed: ${e}`); }
        refresh();
      };

      const fi = session.file_injection || {};
      const has9p = fi.nine_p;
      const tag = fi.mount_tag || "holobench";
      // Full-distro (image-swap/systemd) boards don't run Holobench's initramfs
      // auto-mount, so the share lands on the host but the guest must mount it.
      const fullDistro = has9p && fi.image_swap;
      const mountCmd = `mount -t 9p -o trans=virtio,version=9p2000.L ${tag} /mnt`;
      const hint = has9p ? "live at /mnt · virtio-9p" : "fetch via tftp · 10.0.2.2";
      const emptyHint = !has9p
        ? "no files yet — drop one, then `tftp -g -r <name> 10.0.2.2` in the guest"
        : "no files yet — drop one, then `ls /mnt` in the console";
      return html`
        <div class="h-full flex flex-col">
          <div class="text-xs text-slate-500 mb-1">Files → guest
            <span class="text-slate-600">— ${hint}</span></div>
          <div onClick=${() => inputRef.current.click()}
               onDragOver=${e => { e.preventDefault(); setDrag(true); }}
               onDragLeave=${() => setDrag(false)}
               onDrop=${e => { e.preventDefault(); setDrag(false); upload(e.dataTransfer.files); }}
               class="rounded border border-dashed ${drag ? "border-emerald-500 bg-emerald-950/30" : "border-slate-700"} p-3 text-center text-sm text-slate-400 cursor-pointer">
            ${busy ? "Uploading…" : "Drop files here or click to upload"}
            <input ref=${inputRef} type="file" multiple class="hidden" onChange=${onPick} />
          </div>
          ${err && html`<div class="mt-2 text-xs text-rose-400 break-words">${err}</div>`}
          ${fullDistro && html`<div class="mt-2 text-xs text-slate-600 break-words">
            full distro: /mnt auto-mounts at boot. If empty, run:
            <code class="text-slate-500">${mountCmd}</code></div>`}
          <ul class="mt-2 text-sm overflow-auto flex-1 min-h-0">
            ${files.length === 0 && html`<li class="text-slate-600 px-1">${emptyHint}</li>`}
            ${files.map(f => html`
              <li key=${f.name} class="flex justify-between items-center py-0.5 px-1 hover:bg-slate-800/50 rounded">
                <span class="truncate">${f.name} <span class="text-slate-600 text-xs">${fmtSize(f.size)}</span></span>
                <button onClick=${() => del(f.name)} class="text-rose-400 text-xs hover:text-rose-300 px-1">✕</button>
              </li>`)}
          </ul>
        </div>`;
    }

    function Camera({ session }) {
      const cam = session.camera || {};
      const [frames, setFrames] = useState([]);
      const [busy, setBusy] = useState(false);
      const [drag, setDrag] = useState(false);
      const [err, setErr] = useState("");
      const inputRef = useRef(null);

      const refresh = useCallback(() => {
        api(`/api/sessions/${session.id}/camera/frames`)
          .then(d => setFrames(d.frames || []))
          .catch(e => setErr(`couldn't list frames: ${e.detail || e.status || e}`));
      }, [session.id]);
      useEffect(() => { refresh(); const id = setInterval(refresh, 3000); return () => clearInterval(id); }, [session.id]);

      const upload = async (list) => {
        if (!list || !list.length) return;
        setBusy(true); setErr("");
        const failed = [];
        for (const f of list) {
          const fd = new FormData(); fd.append("file", f);
          try {
            const r = await authFetch(`/api/sessions/${session.id}/camera/frames`, { method: "POST", body: fd });
            if (!r.ok) { const e = await r.json().catch(() => ({})); failed.push(`${f.name}: ${e.detail || r.status}`); }
          } catch (e) { failed.push(`${f.name}: ${e}`); }
        }
        setBusy(false);
        setErr(failed.length ? `upload failed — ${failed.join("; ")}` : "");
        refresh();
      };
      const onPick = (e) => { const fl = e.target.files; e.target.value = ""; upload(fl); };
      const del = async (name) => {
        setErr("");
        try {
          const r = await authFetch(`/api/sessions/${session.id}/camera/frames/${encodeURIComponent(name)}`, { method: "DELETE" });
          if (!r.ok) { const e = await r.json().catch(() => ({})); setErr(`delete failed: ${e.detail || r.status}`); }
        } catch (e) { setErr(`delete failed: ${e}`); }
        refresh();
      };

      const geom = cam.width && cam.height
        ? `${cam.width}×${cam.height}${cam.bytes_per_pixel ? "×" + cam.bytes_per_pixel + "bpp" : ""}${cam.pixel_format ? " " + cam.pixel_format : ""}`
        : "geometry unset";
      const applies = cam.runtime_settable ? "applied live each frame tick" : "applied on next (re)boot";
      // imx8-isi media links start DISABLED, so a bare v4l2-ctl fails link_validate
      // (EPIPE). Boards ship their exact media-ctl + v4l2-ctl recipe; fall back to a
      // generic reminder if none is set yet.
      const captureCmd = cam.capture_hint
        || "links start disabled — media-ctl -l/-V to enable the sensor→ISI links and set the format, then v4l2-ctl --stream-mmap -d /dev/video0";
      return html`
        <div class="h-full flex flex-col">
          <div class="text-xs text-slate-500 mb-1">Virtual camera → ISI capture
            <span class="text-slate-600">— ${cam.isi_type || "isi"} · ${geom}</span></div>
          <div onClick=${() => inputRef.current.click()}
               onDragOver=${e => { e.preventDefault(); setDrag(true); }}
               onDragLeave=${() => setDrag(false)}
               onDrop=${e => { e.preventDefault(); setDrag(false); upload(e.dataTransfer.files); }}
               class="rounded border border-dashed ${drag ? "border-emerald-500 bg-emerald-950/30" : "border-slate-700"} p-3 text-center text-sm text-slate-400 cursor-pointer">
            ${busy ? "Uploading…" : `Drop raw frames here or click — exactly ${geom}`}
            <input ref=${inputRef} type="file" multiple class="hidden" onChange=${onPick} />
          </div>
          ${err && html`<div class="mt-2 text-xs text-rose-400 break-words">${err}</div>`}
          <div class="mt-2 text-xs text-slate-600 break-words">
            Frames scan out in filename order, looping (${applies}). Capture in the guest:
            <code class="text-slate-500">${captureCmd}</code></div>
          <ul class="mt-2 text-sm overflow-auto flex-1 min-h-0">
            ${frames.length === 0 && html`<li class="text-slate-600 px-1">no frames yet — drop raw ${geom} frames; empty = gradient test pattern</li>`}
            ${frames.map((f, i) => html`
              <li key=${f.name} class="flex justify-between items-center py-0.5 px-1 hover:bg-slate-800/50 rounded">
                <span class="truncate"><span class="text-slate-600">${i + 1}.</span> ${f.name} <span class="text-slate-600 text-xs">${fmtSize(f.size)}</span></span>
                <button onClick=${() => del(f.name)} class="text-rose-400 text-xs hover:text-rose-300 px-1">✕</button>
              </li>`)}
          </ul>
        </div>`;
    }

    function TextPanel({ session, kind, label }) {
      const [text, setText] = useState("loading…");
      const load = useCallback(() => {
        api(`/api/sessions/${session.id}/introspect/${kind}`)
          .then(d => setText(d.text || "(empty)"))
          .catch(() => setText("(unavailable)"));
      }, [session.id, kind]);
      useEffect(() => { load(); }, [load]);
      return html`
        <div class="h-full flex flex-col">
          <div class="flex items-center justify-between mb-1">
            <div class="text-xs text-slate-500">${label}</div>
            <button onClick=${load} class="text-xs text-slate-400 hover:text-slate-200">↻ refresh</button>
          </div>
          <pre class="flex-1 min-h-0 overflow-auto text-[11px] leading-tight bg-black rounded border border-slate-800 p-2 text-slate-300">${text}</pre>
        </div>`;
    }

    function EventsPanel({ session }) {
      const [evs, setEvs] = useState([]);
      useEffect(() => {
        const load = () => api(`/api/sessions/${session.id}/events`)
          .then(d => setEvs(d.events || [])).catch(() => {});
        load(); const id = setInterval(load, 2000); return () => clearInterval(id);
      }, [session.id]);
      return html`
        <div class="h-full flex flex-col">
          <div class="text-xs text-slate-500 mb-1">QMP event stream <span class="text-slate-600">— live, read-only</span></div>
          <ul class="flex-1 min-h-0 overflow-auto text-[11px] font-mono bg-black rounded border border-slate-800 p-2">
            ${evs.length === 0 && html`<li class="text-slate-600">no events yet — try Reset / Pause / Resume</li>`}
            ${evs.slice().reverse().map((e, i) => html`
              <li key=${i} class="py-0.5">
                <span class="text-emerald-400">${e.event}</span>
                ${e.data && Object.keys(e.data).length > 0 && html`<span class="text-slate-500"> ${JSON.stringify(e.data)}</span>`}
              </li>`)}
          </ul>
        </div>`;
    }

    function DebugPanel({ session }) {
      const port = session.gdb && session.gdb.port;
      const connect = `target remote localhost:${port}`;
      return html`
        <div class="h-full flex flex-col">
          <div class="text-xs text-slate-500 mb-1">Source debug — gdbstub
            <span class="text-slate-600">— ${port ? `listening on 127.0.0.1:${port}` : "disabled"}</span></div>
          <div class="flex-1 min-h-0 overflow-auto bg-black rounded border border-slate-800 p-3 text-sm text-slate-300 space-y-3">
            <div>
              <div class="text-slate-500 text-xs mb-1">Attach a cross-gdb to the running guest:</div>
              <pre class="bg-slate-900 rounded p-2 text-emerald-300 text-[12px] select-all">aarch64-linux-gnu-gdb vmlinux\n(gdb) ${connect}</pre>
            </div>
            <div class="text-slate-500 text-xs">
              The board keeps running; gdb attaches on demand. Set breakpoints in
              guest code, inspect registers/memory — source-level debugging of an
              emulated SoC, no JTAG probe required.
            </div>
          </div>
        </div>`;
    }

    function SnapshotsPanel({ session }) {
      const [snaps, setSnaps] = useState([]);
      const [name, setName] = useState("");
      const [busy, setBusy] = useState(false);
      const refresh = useCallback(() => api(`/api/sessions/${session.id}/snapshots`)
        .then(d => setSnaps(d.snapshots || [])).catch(() => {}), [session.id]);
      useEffect(() => { refresh(); }, [refresh]);
      const save = async () => {
        if (!name) return; setBusy(true);
        await api(`/api/sessions/${session.id}/snapshots`, {
          method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ name }),
        }).catch(() => {});
        setName(""); setBusy(false); refresh();
      };
      const load = async (t) => { setBusy(true); await authFetch(`/api/sessions/${session.id}/snapshots/${encodeURIComponent(t)}/load`, { method: "POST" }).catch(() => {}); setBusy(false); };
      const del = async (t) => { await authFetch(`/api/sessions/${session.id}/snapshots/${encodeURIComponent(t)}`, { method: "DELETE" }).catch(() => {}); refresh(); };
      return html`
        <div class="h-full flex flex-col">
          <div class="text-xs text-slate-500 mb-1">Snapshots <span class="text-slate-600">— savevm/loadvm · bookmark & jump back</span></div>
          <div class="flex gap-1 mb-2">
            <input value=${name} onChange=${e => setName(e.target.value)} placeholder="name (A-Za-z0-9 _ - .)"
              class="flex-1 bg-slate-800 border border-slate-700 rounded px-2 py-1 text-sm" />
            <button disabled=${busy || !name} onClick=${save} class="px-3 py-1 rounded bg-emerald-700 hover:bg-emerald-600 text-sm disabled:opacity-50">${busy ? "…" : "Save"}</button>
          </div>
          <ul class="flex-1 min-h-0 overflow-auto text-sm">
            ${snaps.length === 0 && html`<li class="text-slate-600 px-1">no snapshots — Save bookmarks full VM state; Load jumps back</li>`}
            ${snaps.map(s => html`
              <li key=${s.tag} class="flex justify-between items-center py-0.5 px-1 hover:bg-slate-800/50 rounded font-mono text-[12px]">
                <span class="truncate">${s.tag}</span>
                <span class="flex gap-2">
                  <button disabled=${busy} onClick=${() => load(s.tag)} class="text-emerald-400 hover:text-emerald-300 text-xs">load</button>
                  <button onClick=${() => del(s.tag)} class="text-rose-400 hover:text-rose-300 text-xs">✕</button>
                </span>
              </li>`)}
          </ul>
        </div>`;
    }

    function RightPanel({ session, onAction, busy }) {
      const fi = session.file_injection || {}, ins = session.introspection || {};
      const tabs = [];
      if (session.display && session.display.enabled) tabs.push(["lcd", "LCD"]);
      if (ins.memory_map) tabs.push(["mem", "Memory"]);
      if (ins.device_tree) tabs.push(["dev", "Devices"]);
      if (ins.qmp_events) tabs.push(["evt", "Events"]);
      if (session.gdb && session.gdb.enabled) tabs.push(["dbg", "Debug"]);
      if (ins.snapshots) tabs.push(["snap", "Snapshots"]);
      if (fi.nine_p || fi.tftp) tabs.push(["files", "Files"]);
      if (session.camera && session.camera.enabled) tabs.push(["cam", "Camera"]);
      const [active, setActive] = useState(tabs.length ? tabs[0][0] : null);
      if (!tabs.length) return null;
      const cur = tabs.some(t => t[0] === active) ? active : tabs[0][0];
      return html`
        <div class="w-[44%] max-w-[620px] min-h-0 flex flex-col">
          <div class="flex gap-1 mb-2 flex-wrap">
            ${tabs.map(([k, label]) => html`
              <button key=${k} onClick=${() => setActive(k)}
                class="px-3 py-1 rounded-t text-sm ${cur === k ? "bg-slate-800 text-slate-100" : "bg-slate-900 text-slate-500 hover:text-slate-300"}">
                ${label}
              </button>`)}
          </div>
          <div class="flex-1 min-h-0">
            ${cur === "lcd" && html`<${Display} session=${session} onAction=${onAction} busy=${busy} />`}
            ${cur === "mem" && html`<${TextPanel} session=${session} kind="mtree" label="Memory map — info mtree" />`}
            ${cur === "dev" && html`<${TextPanel} session=${session} kind="qtree" label="Device tree — info qtree" />`}
            ${cur === "evt" && html`<${EventsPanel} session=${session} />`}
            ${cur === "dbg" && html`<${DebugPanel} session=${session} />`}
            ${cur === "snap" && html`<${SnapshotsPanel} session=${session} />`}
            ${cur === "files" && html`<${Files} session=${session} />`}
            ${cur === "cam" && html`<${Camera} session=${session} />`}
          </div>
        </div>`;
    }

    function Badge({ ok, children }) {
      const cls = ok ? "bg-emerald-900 text-emerald-300" : "bg-slate-700 text-slate-300";
      return html`<span class="px-2 py-0.5 rounded text-xs ${cls}">${children}</span>`;
    }

    function Login({ onLogin }) {
      const [u, setU] = useState(""); const [p, setP] = useState("");
      const [err, setErr] = useState(null); const [busy, setBusy] = useState(false);
      const [cfg, setCfg] = useState({});
      const [mode, setMode] = useState("login");   // "login" | "register"
      // Pull the public config (no token needed): demo creds + onboarding/registration state.
      useEffect(() => {
        api("/api/public-config").then(c => {
          setCfg(c);
          if (c.needs_onboarding) setMode("register");   // fresh instance -> create the admin
        }).catch(() => {});
      }, []);
      const onboarding = !!cfg.needs_onboarding;
      const canRegister = !!cfg.can_register;
      const demo = mode === "login" ? cfg.demo_login : null;
      const finish = (r) => { setToken(r.token); onLogin(); };
      const doLogin = async (username, password) => {
        setBusy(true); setErr(null);
        try { finish(await api("/api/login", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ username, password }) })); }
        catch (ex) { setErr(ex.detail || "login failed"); setBusy(false); }
      };
      const doRegister = async () => {
        setBusy(true); setErr(null);
        try { finish(await api("/api/register", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ username: u, password: p }) })); }
        catch (ex) { setErr(ex.detail || "registration failed"); setBusy(false); }
      };
      const submit = (e) => { if (e) e.preventDefault(); mode === "register" ? doRegister() : doLogin(u, p); };
      const useDemo = () => { setU(cfg.demo_login.username); setP(cfg.demo_login.password); doLogin(cfg.demo_login.username, cfg.demo_login.password); };
      const title = mode === "register"
        ? (onboarding ? "Create your admin account" : "Create an account")
        : "Sign in to the board farm";
      const cta = mode === "register" ? (onboarding ? "Create admin account" : "Create account") : "Sign in";
      return html`
        <div class="h-full flex items-center justify-center">
          <form onSubmit=${submit} class="bg-slate-900 border border-slate-800 rounded-lg p-6 w-80 space-y-3">
            <div class="text-lg font-semibold">🛰️ Holobench <span class="text-slate-500 text-sm font-normal">virtual EVK</span></div>
            <div class="text-xs text-slate-500">${title}</div>
            ${onboarding && html`<div class="text-[11px] text-emerald-400/90 bg-emerald-950/40 border border-emerald-900 rounded p-2">
              👋 First time here — no accounts yet. The account you create now becomes the <b>admin</b>.</div>`}
            ${err && html`<div class="text-rose-400 text-sm">${err}</div>`}
            <input autoFocus value=${u} onChange=${e => setU(e.target.value)} placeholder="username" autoComplete="username"
              class="w-full bg-slate-800 border border-slate-700 rounded px-2 py-1.5 text-sm" />
            <input type="password" value=${p} onChange=${e => setP(e.target.value)} placeholder="password"
              autoComplete=${mode === "register" ? "new-password" : "current-password"}
              class="w-full bg-slate-800 border border-slate-700 rounded px-2 py-1.5 text-sm" />
            ${mode === "register" && html`<div class="text-[11px] text-slate-500">At least 6 characters.</div>`}
            <button disabled=${busy} type="submit"
              class="w-full px-3 py-1.5 rounded bg-emerald-600 hover:bg-emerald-500 text-sm font-medium disabled:opacity-50">
              ${busy ? "…" : cta}
            </button>
            ${canRegister && !onboarding && html`
              <div class="text-center text-xs text-slate-500">
                ${mode === "login"
                  ? html`No account? <button type="button" onClick=${() => { setErr(null); setMode("register"); }} class="text-emerald-400 hover:text-emerald-300">Create one</button>`
                  : html`Have an account? <button type="button" onClick=${() => { setErr(null); setMode("login"); }} class="text-emerald-400 hover:text-emerald-300">Sign in</button>`}
              </div>`}
            ${demo && html`
              <div class="mt-1 rounded border border-slate-700 bg-slate-800/50 p-2.5 text-xs space-y-1.5">
                <div class="text-slate-400">👋 Just trying it out? Use the demo account:</div>
                <div class="font-mono text-slate-300">
                  user <span class="text-emerald-300 select-all">${demo.username}</span>
                  · pass <span class="text-emerald-300 select-all">${demo.password}</span>
                </div>
                <button type="button" disabled=${busy} onClick=${useDemo}
                  class="w-full px-2 py-1 rounded bg-slate-700 hover:bg-slate-600 text-xs disabled:opacity-50">
                  Sign in as demo
                </button>
              </div>`}
          </form>
        </div>`;
    }

    function UsersTab({ me }) {
      const [users, setUsers] = useState([]);
      const [u, setU] = useState(""); const [p, setP] = useState(""); const [role, setRole] = useState("user");
      const [err, setErr] = useState(""); const [busy, setBusy] = useState(false);
      const refresh = useCallback(() => {
        api("/api/users").then(setUsers).catch(e => setErr(e.detail || `couldn't list users (${e.status || e})`));
      }, []);
      useEffect(() => { refresh(); }, [refresh]);
      const add = async (e) => {
        if (e) e.preventDefault();
        if (!u || !p) { setErr("username and password required"); return; }
        setBusy(true); setErr("");
        try {
          await api("/api/users", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: u, password: p, role }),
          });
          setU(""); setP(""); setRole("user"); refresh();
        } catch (ex) { setErr(ex.detail || `add failed (${ex.status || ex})`); }
        finally { setBusy(false); }
      };
      const del = async (name) => {
        setErr("");
        try {
          const r = await authFetch(`/api/users/${encodeURIComponent(name)}`, { method: "DELETE" });
          if (!r.ok) { const e = await r.json().catch(() => ({})); setErr(e.detail || `delete failed (${r.status})`); }
        } catch (ex) { setErr(`delete failed: ${ex}`); }
        refresh();
      };
      return html`
        <div class="flex flex-col min-h-0">
          <form onSubmit=${add} class="px-4 py-3 border-b border-slate-800 flex gap-2 items-center flex-wrap">
            <input value=${u} onChange=${e => setU(e.target.value)} placeholder="username" autoComplete="off"
              class="flex-1 min-w-[8rem] bg-slate-800 border border-slate-700 rounded px-2 py-1 text-sm" />
            <input type="password" value=${p} onChange=${e => setP(e.target.value)} placeholder="password" autoComplete="new-password"
              class="flex-1 min-w-[8rem] bg-slate-800 border border-slate-700 rounded px-2 py-1 text-sm" />
            <select value=${role} onChange=${e => setRole(e.target.value)}
              class="bg-slate-800 border border-slate-700 rounded px-2 py-1 text-sm">
              <option value="user">user</option>
              <option value="admin">admin</option>
            </select>
            <button type="submit" disabled=${busy || !u || !p}
              class="px-3 py-1 rounded bg-emerald-600 hover:bg-emerald-500 text-sm font-medium disabled:opacity-50">${busy ? "…" : "Add"}</button>
          </form>
          ${err && html`<div class="px-4 py-2 text-xs text-rose-400 break-words">${err}</div>`}
          <ul class="flex-1 min-h-0 overflow-auto px-2 py-2 text-sm">
            ${users.length === 0 && html`<li class="text-slate-600 px-2 py-1">no users</li>`}
            ${users.map(usr => html`
              <li key=${usr.username} class="flex justify-between items-center py-1 px-2 hover:bg-slate-800/50 rounded">
                <span class="truncate">${usr.username}
                  <span class="ml-1 px-1.5 py-0.5 rounded text-[10px] ${usr.role === "admin" ? "bg-emerald-900 text-emerald-300" : "bg-slate-700 text-slate-300"}">${usr.role}</span>
                  ${usr.username === me.username && html`<span class="ml-1 text-[10px] text-slate-500">(you)</span>`}
                </span>
                ${usr.username !== me.username
                  ? html`<button onClick=${() => del(usr.username)} class="text-rose-400 text-xs hover:text-rose-300 px-1">remove</button>`
                  : html`<span class="text-slate-600 text-xs px-1">—</span>`}
              </li>`)}
          </ul>
          <div class="px-4 py-2 border-t border-slate-800 text-[11px] text-slate-600">
            Adding an existing username updates their password/role. You can't remove your own account.
          </div>
        </div>`;
    }

    function SessionsTab() {
      const [data, setData] = useState(null);
      const [err, setErr] = useState("");
      const [busy, setBusy] = useState("");
      const refresh = useCallback(() => {
        api("/api/admin/sessions").then(setData).catch(e => setErr(e.detail || `couldn't list sessions (${e.status || e})`));
      }, []);
      useEffect(() => { refresh(); const id = setInterval(refresh, 3000); return () => clearInterval(id); }, [refresh]);
      const kill = async (s) => {
        const who = s.owner || "—";
        if (!window.confirm(`Kill ${who}'s board "${s.display_name}" (${s.id})?\nThis powers it off immediately.`)) return;
        setBusy(s.id); setErr("");
        try { await api(`/api/sessions/${s.id}/actions/stop`, { method: "POST" }); }
        catch (e) { setErr(e.detail || `kill failed (${e.status || e})`); }
        finally { setBusy(""); refresh(); }
      };
      const rows = data && data.sessions;
      const cores = (data && data.host_cores) || 1;
      const mb = (n) => n == null ? "—" : (n >= 1024 ? (n / 1024).toFixed(1) + " GB" : Math.round(n) + " MB");
      const pct = (n) => n == null ? "—" : n + "%";
      const hostPct = (n) => n == null ? "—" : (n / cores < 0.1 ? "<0.1%" : (n / cores).toFixed(n / cores < 10 ? 1 : 0) + "%");
      const dur = (n) => n == null ? "—" : fmtDur(n);
      // thresholds are PER-CORE: >1 core pegged = red, ~1 core = amber.
      const cpuCls = (n) => n == null ? "" : (n > 150 ? "text-rose-400" : n > 90 ? "text-amber-400" : "text-slate-300");
      const idleCls = (n) => n == null ? "text-slate-500" : (n > 1800 ? "text-rose-400" : n > 600 ? "text-amber-400" : "text-slate-400");
      const th = "text-left font-medium text-slate-500 px-2 py-1";
      const td = "px-2 py-1 whitespace-nowrap";
      const sumCpu = (rows || []).reduce((a, s) => a + (s.cpu_pct || 0), 0);
      return html`
        <div class="flex flex-col min-h-0">
          <div class="px-4 py-2 text-[11px] text-slate-500 border-b border-slate-800">
            Every running board across all users. <b>CPU</b> is per-core (100% = one full host core); <b>Host</b> is the share
            of all ${cores} cores. Idle = time since the board last produced console output (a stalled log usually means nobody's
            using it). <span class="text-amber-400">amber</span>/<span class="text-rose-400">red</span> flag heavy CPU or long idle.
            ${rows && rows.length > 0 && html`<span class="text-slate-400"> · Host: <b>${cores}</b> cores · <b>${rows.length}</b> board${rows.length === 1 ? "" : "s"} ·
              ~<b>${(sumCpu / 100).toFixed(1)}</b> cores busy (<b>${Math.round(sumCpu / cores)}%</b> of host).</span>`}
          </div>
          ${err && html`<div class="px-4 py-2 text-xs text-rose-400 break-words">${err}</div>`}
          <div class="flex-1 min-h-0 overflow-auto">
            <table class="w-full text-[12px]">
              <thead class="sticky top-0 bg-slate-900"><tr>
                <th class=${th}>User</th><th class=${th}>Board</th><th class=${th}>State</th>
                <th class=${th} title="per-core: 100% = one full host core">CPU</th>
                <th class=${th} title="share of all host cores">Host</th>
                <th class=${th}>RAM</th><th class=${th}>Disk</th>
                <th class=${th}>Up</th><th class=${th}>Idle</th><th class=${th}>Reserve</th><th class=${th}></th>
              </tr></thead>
              <tbody>
                ${rows && rows.length === 0 && html`<tr><td class="px-4 py-3 text-slate-600" colspan="11">no active boards</td></tr>`}
                ${rows == null && html`<tr><td class="px-4 py-3 text-slate-600" colspan="11">loading…</td></tr>`}
                ${(rows || []).map(s => html`
                  <tr key=${s.id} class="border-t border-slate-800/60 hover:bg-slate-800/40">
                    <td class=${td}>${s.owner || html`<span class="text-slate-500">—</span>`}</td>
                    <td class=${td} title=${s.id}>${s.display_name}</td>
                    <td class=${td}><span class="px-1.5 py-0.5 rounded text-[10px] ${s.state === "running" ? "bg-emerald-900 text-emerald-300" : "bg-slate-700 text-slate-300"}">${s.state}</span></td>
                    <td class="${td} font-mono ${cpuCls(s.cpu_pct)}">${pct(s.cpu_pct)}</td>
                    <td class="${td} font-mono text-slate-400">${hostPct(s.cpu_pct)}</td>
                    <td class="${td} font-mono text-slate-300">${mb(s.rss_mb)}</td>
                    <td class="${td} font-mono text-slate-300">${mb(s.disk_mb)}</td>
                    <td class="${td} font-mono text-slate-400">${dur(s.uptime_s)}</td>
                    <td class="${td} font-mono ${idleCls(s.idle_s)}">${dur(s.idle_s)}</td>
                    <td class="${td} font-mono text-slate-400">${s.reservation.infinite ? "∞" : dur(s.reservation.remaining_s)}</td>
                    <td class=${td}><button disabled=${busy === s.id} onClick=${() => kill(s)}
                      class="px-2 py-0.5 rounded bg-rose-800 hover:bg-rose-700 text-xs disabled:opacity-50">${busy === s.id ? "…" : "Kill"}</button></td>
                  </tr>`)}
              </tbody>
            </table>
          </div>
        </div>`;
    }

    function AdminPanel({ me, onClose }) {
      const [tab, setTab] = useState("sessions");
      const tabBtn = (k, label) => html`<button onClick=${() => setTab(k)}
        class="px-3 py-1 rounded text-sm ${tab === k ? "bg-slate-800 text-slate-100" : "text-slate-400 hover:text-slate-200"}">${label}</button>`;
      return html`
        <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4" onClick=${onClose}>
          <div class="bg-slate-900 border border-slate-800 rounded-lg w-[58rem] max-w-[96vw] max-h-[88vh] flex flex-col shadow-xl"
               onClick=${e => e.stopPropagation()}>
            <div class="flex items-center justify-between px-4 py-3 border-b border-slate-800">
              <div class="flex items-center gap-2">
                <span class="font-semibold">Admin</span>
                ${tabBtn("sessions", "Active sessions")} ${tabBtn("users", "Users")}
              </div>
              <button onClick=${onClose} class="text-slate-400 hover:text-slate-200 text-lg leading-none">✕</button>
            </div>
            ${tab === "users" ? html`<${UsersTab} me=${me} />` : html`<${SessionsTab} />`}
          </div>
        </div>`;
    }

    function App() {
      const [profiles, setProfiles] = useState([]);
      const [selected, setSelected] = useState("");
      const [infinite, setInfinite] = useState(false);
      const [session, setSession] = useState(null);
      const [tab, setTab] = useState(null);
      const [busy, setBusy] = useState(false);
      const [err, setErr] = useState(null);
      const [now, setNow] = useState(() => Date.now() / 1000);
      useEffect(() => {
        const id = setInterval(() => setNow(Date.now() / 1000), 1000);
        return () => clearInterval(id);
      }, []);
      const [adminOpen, setAdminOpen] = useState(false);
      // undefined = checking, null = needs login, object = authenticated
      const [me, setMe] = useState(undefined);
      const loadMe = useCallback(() => {
        api("/api/me").then(setMe).catch(() => setMe(null));
      }, []);
      useEffect(() => { loadMe(); }, [loadMe]);
      const logout = () => { setToken(null); setSession(null); setMe(null); };

      const refreshProfiles = useCallback(() => {
        api("/api/profiles").then(ps => {
          setProfiles(ps);
          if (ps.length && !selected) setSelected(ps[0].id);
        }).catch(e => setErr(e.detail || String(e)));
      }, [selected]);

      // Load profiles once authenticated (and clear any pre-login 401). Running
      // this on mount would 401 under enforced auth — the token isn't set yet.
      useEffect(() => { if (me) { setErr(null); refreshProfiles(); } }, [me]);

      const launch = async () => {
        setBusy(true); setErr(null);
        try {
          const s = await api("/api/sessions", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ profile_id: selected, ...(infinite ? { minutes: 0 } : {}) }),
          });
          setSession(s);
          focusDefaultTab(s);
        } catch (e) { setErr(e.detail || String(e)); }
        finally { setBusy(false); }
      };

      const focusDefaultTab = (s) => {
        const def = (s.serial || []).find(x => x.default) || (s.serial || [])[0];
        setTab(def ? def.chardev : null);
      };

      const action = async (verb) => {
        if (!session) return;
        setBusy(true); setErr(null);
        try {
          const r = await api(`/api/sessions/${session.id}/actions/${verb}`, { method: "POST" });
          if (verb === "stop") { setSession(null); setTab(null); }
          // These relaunch the board (new session id) and return a full view.
          else if (verb === "reinstall" || verb === "attach_lcd" || verb === "detach_lcd") { setSession(r); focusDefaultTab(r); }
          else setSession(s => ({ ...s, state: r.state }));
        } catch (e) { setErr(e.detail || String(e)); }
        finally { setBusy(false); }
      };

      const extend = async () => {
        if (!session) return;
        setErr(null);
        try {
          const r = await api(`/api/sessions/${session.id}/extend?minutes=30`, { method: "POST" });
          setSession(s => ({ ...s, reservation: r.reservation }));
        } catch (e) { setErr(e.detail || String(e)); }
      };

      const sel = profiles.find(p => p.id === selected);

      if (me === undefined)
        return html`<div class="h-full flex items-center justify-center text-slate-500">Loading…</div>`;
      if (me === null) return html`<${Login} onLogin=${loadMe} />`;

      return html`
        <div class="h-full flex flex-col">
          <header class="flex items-center gap-3 px-4 py-3 border-b border-slate-800 bg-slate-900/60">
            <div class="font-semibold text-lg">🛰️ Holobench <span class="text-slate-500 text-sm font-normal">virtual EVK</span></div>
            <div class="flex-1"></div>
            ${me && me.auth_enabled && html`
              <span class="text-xs text-slate-400">${me.username}${me.role === "admin" ? " · admin" : ""}</span>
              ${me.role === "admin" && html`
                <button onClick=${() => setAdminOpen(true)} class="px-2 py-1 rounded bg-slate-800 hover:bg-slate-700 text-xs" title="admin: active sessions + users">Admin</button>`}
              <button onClick=${logout} class="px-2 py-1 rounded bg-slate-800 hover:bg-slate-700 text-xs">Logout</button>
              <span class="text-slate-700">|</span>`}
            ${!session && html`
              <select class="bg-slate-800 border border-slate-700 rounded px-2 py-1 text-sm"
                      value=${selected} onChange=${e => setSelected(e.target.value)}>
                ${profiles.map(p => html`<option key=${p.id} value=${p.id}>${p.display_name} — ${p.machine}</option>`)}
              </select>
              ${sel && html`<${Badge} ok=${sel.assets_ready}>${sel.assets_ready ? "assets ready" : "no assets"}<//>`}
              <label class="flex items-center gap-1 text-xs text-slate-400 cursor-pointer select-none" title="reserve with no time limit (never auto-reaped)">
                <input type="checkbox" checked=${infinite} onChange=${e => setInfinite(e.target.checked)} /> ∞ no limit
              </label>
              <button disabled=${busy || !selected} onClick=${launch}
                class="px-3 py-1 rounded bg-emerald-600 hover:bg-emerald-500 disabled:opacity-50 text-sm font-medium">
                ${busy ? "Reserving…" : "Reserve & Boot"}
              </button>
            `}
            ${session && (() => {
              const resv = session.reservation || {};
              const inf = resv.infinite;
              const rem = (!inf && resv.expires_at) ? resv.expires_at - now : null;
              const low = rem !== null && rem < 120;
              return html`
              <span class="text-sm text-slate-400">${session.display_name}</span>
              <${Badge} ok=${session.state === "running"}>${session.state}<//>
              <span class="text-xs text-slate-500">pid ${session.pid}</span>
              ${inf && html`
                <span class="px-2 py-0.5 rounded text-xs font-mono bg-slate-700 text-slate-300" title="no reservation limit — never auto-reaped">⏱ ∞</span>`}
              ${rem !== null && html`
                <span class="px-2 py-0.5 rounded text-xs font-mono ${low ? "bg-rose-900 text-rose-200" : "bg-slate-700 text-slate-200"}"
                      title="reservation remaining">⏱ ${fmtDur(rem)}</span>
                <button onClick=${extend} class="px-2 py-1 rounded bg-slate-700 hover:bg-slate-600 text-xs">+30m</button>`}
              <button disabled=${busy} onClick=${() => action("reset")} class="px-2 py-1 rounded bg-amber-700 hover:bg-amber-600 text-sm">Reset</button>
              <button disabled=${busy} onClick=${() => action("reinstall")} class="px-2 py-1 rounded bg-amber-800 hover:bg-amber-700 text-sm" title="cold cycle: fresh boot">Reinstall</button>
              ${session.state === "running"
                ? html`<button disabled=${busy} onClick=${() => action("pause")} class="px-2 py-1 rounded bg-slate-700 hover:bg-slate-600 text-sm">Pause</button>`
                : html`<button disabled=${busy} onClick=${() => action("resume")} class="px-2 py-1 rounded bg-slate-700 hover:bg-slate-600 text-sm">Resume</button>`}
              <button disabled=${busy} onClick=${() => action("stop")} class="px-2 py-1 rounded bg-rose-700 hover:bg-rose-600 text-sm">Power off</button>`;
            })()}
          </header>

          ${err && html`<div class="px-4 py-2 bg-rose-950 text-rose-300 text-sm border-b border-rose-900">${err}</div>`}

          <main class="flex-1 min-h-0 p-3">
            ${!session && html`
              <div class="h-full flex items-center justify-center text-slate-500">
                <div class="text-center">
                  <div class="text-5xl mb-3">🖥️</div>
                  <div>Pick a board and <span class="text-emerald-400">Reserve & Boot</span> to open its console.</div>
                  <div class="text-xs mt-2 text-slate-600">No silicon. A QEMU machine model behind a board-farm UX.</div>
                </div>
              </div>
            `}
            ${session && html`
              <div class="h-full flex gap-3">
                <div class="flex-1 min-h-0 flex flex-col">
                  ${session.serial.length > 1 && html`
                    <div class="flex gap-1 mb-2">
                      ${session.serial.map(p => html`
                        <button key=${p.chardev} onClick=${() => setTab(p.chardev)}
                          class="px-3 py-1 rounded-t text-sm ${tab === p.chardev ? "bg-slate-800 text-slate-100" : "bg-slate-900 text-slate-500"}">
                          ${p.name}
                        </button>`)}
                    </div>`}
                  <div class="flex-1 min-h-0 rounded border border-slate-800 overflow-hidden bg-[#0b0f17]">
                    <${Console} key=${session.id + ":" + (tab||"")} session=${session} chardev=${tab} />
                  </div>
                </div>
                <${RightPanel} session=${session} onAction=${action} busy=${busy} />
              </div>
            `}
          </main>

          ${adminOpen && html`<${AdminPanel} me=${me} onClose=${() => setAdminOpen(false)} />`}
        </div>`;
    }

    createRoot(document.getElementById("root")).render(html`<${App} />`);
  </script>
</body>
</html>
