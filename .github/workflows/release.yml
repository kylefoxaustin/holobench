# Auto-build + publish the fat board images on a version tag.
#
# REQUIRES A SELF-HOSTED RUNNER on a host that has the forked qemu builds + board
# assets baked by docker/build.sh — GitHub-hosted runners can't (the forked QEMU
# and the ~12 GB golden .wic aren't in the repo, and hosted-runner disk is too
# small). One-time setup:
#   1. Repo → Settings → Actions → Runners → "New self-hosted runner", run its
#      ./config.sh on your build box (label it `holobench-builder`).
#   2. Ensure that box's docker is logged in to GHCR (or set a CR_PAT secret with
#      write:packages and the login step below).
# Then: `git tag v0.2.4 && git push origin v0.2.4` -> images build + publish.
name: release-images
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version: { description: "version tag (e.g. v0.2.4)", required: true }
jobs:
  build-and-push:
    runs-on: [self-hosted, holobench-builder]
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        run: echo "${{ secrets.CR_PAT }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin
      - name: Build + push images
        run: |
          VER="${{ github.event.inputs.version || github.ref_name }}"
          tools/release.sh "$VER"
