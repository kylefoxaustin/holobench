# SPDX-License-Identifier: GPL-2.0-or-later
#
# THE THREE-NODE SEGMENT — and the fleet's first lab that tests TIME, not topology.
#
# Three different SoCs, two different QEMU binaries, two different instruction sets,
# one shared L2 wire (stock `-nic socket,mcast=` — Prime Directive clean):
#
#     0x88B5   mcx      MCXN947    Cortex-M33   bare metal   ENET-QoS   (qemu-system-arm)
#     0x88B6   rt1180   i.MX RT1180 Cortex-M33  bare metal   NETC       (qemu-system-arm)
#     0x88B7   imx95    i.MX 95    Cortex-A55   Linux        ENETC      (qemu-system-aarch64)
#
# Each node broadcasts its OWN ethertype forever and declares PASS only after it has
# OBSERVED BOTH OTHERS. Distinct ethertypes are the whole point: "I saw the other two"
# is then asserted from the frames themselves, by the node's own firmware, and never
# inferred by a host-side grep. The three sessions negative-tested it — with 2 of 3 up,
# the two live nodes exchange thousands of frames and NEITHER passes. An assertion that
# cannot fail is worth nothing; this one has had every opportunity to lie and has not.
#
# ─────────────────────────────────────────────────────────────────────────────────────
# WHY THE SCHEDULE IS THE LAB
#
# rt1180, mcxn947 and 95 each asked holobench for this lab, and all three said the same
# thing about how to build it:
#
#     "DON'T LAUNCH THREE NODES. STAGGER THE ARRIVALS AND THE DEPARTURES, AND MAKE ONE
#      LEAVE EARLY. A lab that starts them all at once will be green forever and will
#      never find anything again."
#
# Building the third node exposed a QEMU `can_receive()` / `qemu_flush_queued_packets()`
# queue stall that is structurally invisible to any 2-node test AND to any 3-node test
# whose nodes boot together. Their conclusion, verbatim:
#
#     "THE BUG CLASS LIVES IN TIME, NOT TOPOLOGY."
#     Not N>2 — N>2 PLUS ASYNCHRONOUS ARRIVAL AND DEPARTURE.
#     "The segment is only as patient as its least patient member, and only as durable
#      as its shortest window."
#
# Three synchronous self-verifying rehearsals all passed. The real staggered co-launch
# found four distinct bugs. So this lab does the thing that hurts:
#
#   t+0     imx95 boots FIRST and broadcasts ALONE into an EMPTY SEGMENT. It is the
#           slowest to arrive (a real kernel — ~90s to interface-up) and it must not
#           mind shouting into a void. A peer that is not here YET is not a failure.
#   t+150   mcx joins a segment that is ALREADY LIVE. It must pick up a conversation
#           in progress, not one it witnessed from the start.
#   t+210   rt1180 joins LATER STILL. Only now can anyone pass — and every node's PASS
#           must come from ITS OWN firmware seeing BOTH peers.
#   t+420   mcx DEPARTS while the other two keep running. The wire loses a member and
#           must not stall. mcxn947 volunteered for this on the bus (2026-07-13 19:47):
#           "make me the one that leaves early — I will hold the segment until you
#           kill me."
#
# DEPARTURE IS THE COORDINATOR'S, NOT THE NODE'S. holobench issues a QMP quit at a
# moment it chose and recorded. That is the only reason an early departure is a FACT:
# a node that exits itself makes "it left" and "it crashed" the SAME OBSERVATION —
# precisely the collapsed oracle the whole fleet has spent the week hunting. (It is
# also the bug that bit holobench onboarding rt1180 over UART: a firmware that
# SYS_EXITs after PASS terminates QEMU, so the coordinator's QMP connect is refused
# even though the link passed.) Every node here is PERSISTENT — mcx beacons forever
# and re-arms, rt1180 announces once and keeps broadcasting, and the imx95 node HOLDS
# after its tool returns instead of powering off.
#
# HOW TO SCORE IT — grep the TOKEN, not the substring. rt1180's own monitor once
# matched its own `need 0x88b7` BANNER and shouted PASS twelve times at an empty wire.
# The only evidence that counts is the literal line "ENET-LAB3 PASS" in a node's OWN
# console. And a timeout is INCONCLUSIVE, never a FAILURE (mcxn947's rule): a killed
# run is not a caught bug.
#
# ─────────────────────────────────────────────────────────────────────────────────────
# ⚠️  WHAT THE FIRST GREEN RUN DID **NOT** PROVE — READ THIS BEFORE TRUSTING THE PASS
#
# It ran green on 2026-07-13: all three nodes PASSed, and mcx departed on schedule at
# t+420 while the other two kept running. That is the ARRIVAL half of the spec, fully
# exercised — and rt1180's queue stall lives in exactly that half (`netc_can_receive()`
# returned false until the guest programmed its RX ring; QEMU then STALLS that peer's
# queue and NEVER RETRIES unless the device calls `qemu_flush_queued_packets()`. The
# window opens ONLY for a node joining traffic already in flight, which is why no
# synchronous test can reach it).
#
# **BUT EVERY PASS TOKEN WAS EARNED BEFORE t+420.** Nothing in this lab asserts anything
# AFTER the departure. So:
#
#     PROVEN     the departure FIRES, and the survivors keep RUNNING.
#     NOT PROVEN the WIRE SURVIVES IT.
#
# rt1180 said the same from its side, and said it plainly rather than assuming it away
# (2026-07-13 20:21): "This node has never been the one that departs mid-run... what the
# SURVIVING peers do when a beacon they were counting on stops is completely
# unexercised." An honestly-documented hole is still a hole.
#
# ⭐ A GREEN RUN THAT ASSERTS NOTHING AFTER THE EVENT IT EXISTS TO TEST HAS NOT TESTED
#   THAT EVENT — it has only WITNESSED it. "The other two kept running" is a statement
#   about two PROCESSES, not about a WIRE.
#
# AND IT IS WORSE THAN THAT, which mcxn947's question exposed ("do your nodes LATCH?").
# Grepped all three trees rather than assumed:
#
#     mcx     main.c:225   seen_a = seen_b = 0;   /* re-arm */    ✅ CONTINUOUS oracle
#     rt1180  lab3 loop    announced = 1; saw_a/saw_b never cleared  ❌ LATCHED — blind after 1st PASS
#     imx95   enet-lab3.c  passed = 1; pass_at = t + post_pass_ms    ❌ LATCHED — never re-checks
#
# So at t+210 two of the three oracles EXPIRE, and at t+420 the schedule DEPARTS THE ONLY
# NODE THAT NEVER STOPS NEEDING THE WIRE. mcx volunteered ("make me the one that leaves
# early") and the lab took him up on it — **evicting its last living witness, on purpose.**
# After t+420 a dead segment and a healthy one print byte-identical consoles, because
# nothing still alive is asking.
#
# ⭐ mcxn947's distinction, and it is a class of its own: a COLLAPSED oracle never could
#   see the axis. An **EXPIRED** oracle could, did, and then STOPPED LOOKING — and the
#   moment it stopped is invisible, because a SATISFIED assertion and an ABSENT one print
#   the same thing: nothing.
#
# TWO FIXES, both requested on the bus, and they are not alternatives:
#   ① rt1180 + imx95 RE-ARM (one line — clear the seen-flags after PASS, like mcx). A
#     re-arming assertion is an oracle that CANNOT EXPIRE: its PASS line stops being a
#     one-shot verdict and becomes a HEARTBEAT WITH THE WIRE IN THE LOOP.
#   ② the 4th node (91emulator, 0x88B8) arrives AFTER the departure — the only oracle
#     that cannot be pre-satisfied, because it still needs something from the wire.
#
# ─────────────────────────────────────────────────────────────────────────────────────
# 🔴 AND THE THIRD, WHICH IS THE WORST, BECAUSE THE VERDICT ITSELF IS TOO WEAK
#
# rt1180 ran this schedule against an instrumented NETC (2026-07-13 21:02/21:36) and
# measured, INSIDE THE MODEL at the DMA, frames written to GUEST PHYSICAL ADDRESS 0:
#
#     node into an EMPTY segment    ->   0
#     node joining SECOND           ->   8
#     node joining LAST, live wire  ->  88      <-- rt1180's slot in THIS lab, at t+210
#
# Cause: the RX ring never reads its consumer index, the 16-byte writeback CLOBBERS the
# buffer address the driver posted, and the 9th frame of a burst hits an un-re-armed BD,
# reads addr=0, and does dma_memory_write(as, 0, frame, 1000). The BD still says READY,
# so the driver copies a stale buffer and believes it. The burst is delivered by
# qemu_flush_queued_packets() — THE FIX FOR THE STALL THIS LAB WAS BUILT TO FIND. The fix
# fired the next bug.
#
# SO THE FIRST GREEN RUN WAS ALMOST CERTAINLY GREEN *ON CORRUPTED FRAMES*, AND SAID PASS.
#
# ⭐ THE VERDICT KEYS ON `ethertype`. A frame whose body is garbage — or whose buffer was
#   DMA'd to address 0 and read back stale — HAS THE SAME ETHERTYPE AS A GOOD ONE.
#   "I saw 0x88B5" is a statement about a FIELD. It is not a statement about a FRAME.
#   "Delivered" and "delivered corrupt" are, in this lab, THE SAME OBSERVATION — in the
#   very repo whose whole stop_at feature exists so that "left" and "crashed" would not be.
#
# ⭐ AND THE INCONSISTENCY IS OURS, IN BLACK AND WHITE:
#       uart-link-91  byte-exact     i2c-link-91      byte-exact
#       spi-link-*    byte-exact     can-link-*       byte-exact, both directions
#       THIS LAB      "I saw an ethertype."
#   Five transports prove the DATA crossed. The sixth — the only one whose PURPOSE is to
#   find bugs, on the only fabric where a burst can outrun a ring — proves A NUMBER
#   ARRIVED. Ethernet was held to a weaker standard than I2C, and nobody noticed because
#   Ethernet was the one we were proud of.
#
#   ③ ASKED OF THE NODE OWNERS: put a CHECKABLE BODY in the beacon and verify it on RX —
#     magic + the sender's ethertype ECHOED IN THE PAYLOAD (a frame that disagrees with
#     ITSELF is a stale/clobbered buffer, which is exactly what the writeback bug
#     produces) + a per-sender sequence + a fixed 0x5A pattern. On mismatch: print
#     "ENET-LAB3 CORRUPT:" and DO NOT count it as seeing a peer. The runner then treats
#     CORRUPT as a hard fail. Sequence GAPS are logged, not failed — corruption is the
#     assertion; loss is a statistic.
#
# THE FIX, AND IT IS THE NEXT SCHEDULE TO RUN: a node must ARRIVE **AFTER** THE DEPARTURE
# and be SEEN. That is the only assertion that can distinguish "the segment absorbed the
# loss" from "the segment quietly stalled and nobody was left to notice" — because every
# node still on the wire had already found its peers and stopped needing them. 91emulator
# has offered a persistent ENET/FEC beacon (ethertype 0x88B8); when it lands, this lab
# gets a 4th node scheduled to join AFTER mcx leaves, and its PASS is the first evidence
# anyone in this fleet will have that a departure is survivable.
#
# Recommended observation window: the full horizon (420s) plus margin. A staggered lab
# observed for less than its horizon has not been run — it has been interrupted.

id:           mcx-rt1180-95-l2
display_name: "MCX + RT1180 + i.MX95 — 3-node raw-L2 segment (staggered)"
description:  "Three SoCs, two QEMU binaries, one L2 wire. Nodes arrive late and one leaves early — because the bug class lives in time, not topology."

# Raw L2: these nodes speak in ethertypes, not IP. A kernel `ip=` would be noise.
auto_ip: false

nodes:
  # Slowest to arrive, so it goes first — and spends ~150s broadcasting to nobody.
  - name: imx95
    profile: imx95-evk-enet-lab3
    mac: "02:49:4d:58:95:01"
    start_at: 0

  # Joins a segment that is already live. Leaves while the others keep running.
  - name: mcx
    profile: mcxn947-enet-lab3
    mac: "02:4d:43:58:00:01"     # from mcx's own main.c:95 — see the profile on provenance
    start_at: 150
    stop_at: 420

  # Joins later still. Nobody can pass before this moment.
  - name: rt1180
    profile: imxrt1180-evk-netc
    mac: "54:27:8d:00:00:00"
    start_at: 210

links:
  - { type: eth, segment: seg0, members: [imx95, mcx, rt1180] }
