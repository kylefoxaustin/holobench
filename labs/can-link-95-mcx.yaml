# SPDX-License-Identifier: GPL-2.0-or-later
# Mixed-SoC CAN link — i.MX95 (Linux FlexCAN can0) <-> MCXN947 (bare-metal M33
# FlexCAN0) over the fleet-shared can-host-chardev backend. The FINAL mixed-SoC CAN
# cell (91 + 93 + 95 all <-> MCX). imx95 canlink overlay enables flexcan1/2 (dummy
# xceiver). mcx boots the retry-forever canlink.elf (outwaits the ~2.5min imx95 boot).
# mcx=server, board95=reconnecting client. Proven locally in 95's xcheck-can-mcx.sh.
id:           can-link-95-mcx
display_name: "CAN link — i.MX95 <-> MCXN947 (mixed-SoC)"
description:  "Cross-SoC CAN: i.MX95 (Linux FlexCAN can0) bridged to an MCXN947 (bare-metal M33 FlexCAN0) over the can-host-chardev socket transport."
nodes:
  - { name: mcx,     profile: mcxn947-can-device }
  - { name: board95, profile: imx95-evk-sd }
links:
  - { type: can, a: mcx, b: board95 }
