# i.MX93 gateway + an MCXN947 CDC-ACM device over a usbredir USB link. The MCX
# node boots the CDC gadget (mcxn947-usb-device); the i.MX93 host enumerates it as
# /dev/ttyACM0 at HIGH speed. Validated end-to-end THROUGH THE COORDINATOR
# (2026-07-02): 93's ChipIdea PSPD fix + mcx's coherent-HS + re-enumerable CDC
# gadget. Launchable like the eth labs; see docs/TOPOLOGIES.md §USB.
id:           gateway-lab
display_name: "Gateway lab — i.MX93 + MCXN947 CDC-ACM over USB"
description:  "i.MX93 gateway; an MCXN947 CDC-ACM device on USB — the host enumerates it as /dev/ttyACM0."
nodes:
  - { name: gw,     profile: imx93-evk-sd }
  - { name: sensor, profile: mcxn947-usb-device }
links:
  - { type: usb, host: gw, device: sensor }
